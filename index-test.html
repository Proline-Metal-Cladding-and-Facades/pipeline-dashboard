<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>PMC & PF Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--s1:#ffffff;--s2:#edf0f5;--s3:#e2e6ed;--bd:#cdd3de;--tx:#1e2330;--t2:#6b7489;--ac:#4472c4;--a2:#3560b5;--gn:#1a9a6b;--am:#a07008;--rd:#dc4a4a;--pu:#a78bfa;--ft:'Outfit',sans-serif;--mn:'Aptos','Calibri','Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--ft)}
.np{position:fixed;inset:0;background:#f4f6f9;display:flex;align-items:center;justify-content:center;z-index:100}
.nc{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center}
.nc h2{font-size:22px;font-weight:800;margin:12px 0 6px}.nc p{font-size:12px;color:var(--t2);margin-bottom:14px}
.nin{width:100%;padding:12px;border-radius:10px;border:2px solid var(--bd);background:var(--bg);color:var(--tx);font-family:var(--ft);font-size:16px;text-align:center;outline:none;margin-bottom:12px}
.nin:focus{border-color:var(--ac)}.nin::placeholder{color:#a0a8b8}
.nbt{width:100%;padding:12px;border-radius:10px;border:none;background:var(--a2);color:#fff;font-family:var(--ft);font-size:14px;font-weight:700;cursor:pointer}
.nbt:hover:not(:disabled){background:var(--ac)}.nbt:disabled{opacity:.3}
.app{padding:10px 12px 28px 12px}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:0;flex-wrap:wrap;gap:6px;position:sticky;top:0;z-index:25;background:#f4f6f9;padding:4px 0 10px 0}
.hl{display:flex;align-items:center;gap:8px}.hl h1{font-size:18px;font-weight:800}
.dot{width:7px;height:7px;border-radius:50%;animation:pul 2s infinite}@keyframes pul{0%,100%{opacity:1}50%{opacity:.4}}
.dx{font-size:10px;font-weight:600}.hr{display:flex;align-items:center;gap:6px}
.ub{background:var(--s2);border:1px solid var(--bd);padding:3px 10px;border-radius:14px;font-size:10px;font-weight:600}
.svt{font-size:9px;color:var(--t2)}.rb{padding:3px 8px;border-radius:4px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-family:var(--ft);font-size:10px;font-weight:600;cursor:pointer}
.rb:hover{color:var(--tx);border-color:var(--ac)}
.cds{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:8px;}
.cd{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:8px 10px}
.cd.se{border-color:var(--pu);background:rgba(167,139,250,.05)}
.cd .lb{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.cd .vl{font-size:16px;font-weight:800;font-family:var(--mn);margin-top:1px}.cd .sb{font-size:9px;color:var(--t2)}
.br{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
.pl{padding:4px 12px;border-radius:12px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--ft);font-size:10px;font-weight:600;cursor:pointer}
.pl.on{background:var(--a2);border-color:var(--a2);color:#fff}.pl:hover:not(.on){border-color:var(--t2);color:var(--tx)}
.pl.gn{border-color:var(--gn);color:var(--gn)}.pl.gn:hover{background:var(--gn);color:var(--bg)}
.dv{width:1px;height:16px;background:var(--bd);margin:0 3px}
.sx{flex:1;min-width:120px;padding:4px 10px;border-radius:4px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-family:var(--ft);font-size:10px;outline:none}
.sx:focus{border-color:var(--ac)}.sx::placeholder{color:var(--t2)}
.af{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:8px;margin-bottom:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:end}
.af label{font-size:9px;color:var(--t2);display:block;text-transform:uppercase;font-weight:700}
.af input,.af select{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:4px 7px;border-radius:4px;font-family:var(--ft);font-size:10px;outline:none}
.af input:focus,.af select:focus{border-color:var(--ac)}
.mn2{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.mn2 button{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:3px 7px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:600;font-family:var(--ft)}
.mn2 button:hover{color:var(--tx)}.mn2 span{font-size:9px;color:var(--t2)}
/* GRID - EXACT same column structure as the working version */
.gc{overflow-x:auto;border:1px solid var(--bd);border-radius:6px;background:#fff;scrollbar-gutter:stable}
.g{display:grid;min-width:fit-content}
.gh{display:contents}
.gh>div{position:sticky;top:0;z-index:15;background:var(--s2);padding:5px 6px;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.2px;font-weight:700;border-bottom:2px solid var(--bd);white-space:nowrap;text-align:right;cursor:pointer;user-select:none}
.gh>div:hover{color:var(--tx);background:var(--s3)}
.gh>div:first-child{text-align:left;position:sticky;left:0;z-index:6;min-width:240px;cursor:default}
.gh>div.ms{color:var(--pu);background:rgba(167,139,250,.1);border-bottom-color:var(--pu)}
.pg{display:contents}
/* Project row = Sales merged */
.pr{display:contents}
.pr>div{padding:4px 6px;font-size:9px;font-weight:700;background:#f9f9f7;font-family:var(--mn);border-top:0.5px solid #e4e6eb;border-bottom:0.5px solid #e4e6eb;text-align:right;font-family:var(--mn)}
.pr>div:first-child{text-align:left;position:sticky;left:0;z-index:3;background:#f9f9f7;font-family:var(--ft);display:flex;align-items:flex-start;justify-content:flex-start;gap:2px;min-width:240px;padding-left:4px!important}
.eb{background:none;border:1px solid var(--bd);color:var(--t2);cursor:pointer;font-size:9px;border-radius:3px;padding:0 4px;font-weight:700;font-family:var(--mn);line-height:16px;flex-shrink:0}
.eb:hover{color:var(--ac);border-color:var(--ac)}
.xb{background:none;border:none;color:var(--t2);cursor:pointer;font-size:11px;opacity:.3;padding:0 1px;flex-shrink:0}.xb:hover{color:var(--rd);opacity:1}
.pne{cursor:pointer;color:var(--ac);font-size:9px;font-weight:700;white-space:nowrap}.pne:hover{color:var(--am)}
.st-tag{font-size:7px;font-weight:700;padding:1px 5px;border-radius:8px;flex-shrink:0;cursor:pointer}
.st-live{background:rgba(52,211,153,.15);color:var(--gn)}.st-done{background:rgba(125,137,166,.15);color:var(--t2)}.st-pend{background:rgba(220,74,74,.15);color:var(--rd)}.st-awd{background:rgba(68,114,196,.15);color:var(--ac)}
.jid-tag{font-size:9px;color:var(--t2);font-family:var(--mn);flex-shrink:0;background:var(--bg);border:1px solid var(--bd);padding:0 4px;border-radius:3px;outline:none;width:50px}
.jid-tag:focus{border-color:var(--ac);color:var(--tx)}
.cin{background:var(--bg);border:1px solid var(--ac);color:var(--tx);font-family:var(--ft);font-size:9px;padding:2px 4px;border-radius:2px;outline:none;width:140px}
/* Sub rows */
.rw{display:contents}.rw>div{padding:3px 6px;font-size:9px;border-bottom:1px solid rgba(45,52,80,.4);text-align:right}
.rl{text-align:left!important;font-family:var(--ft);font-weight:500;padding-left:4px!important;font-size:9px}
.r1 .rl,.r2 .rl,.r3 .rl{color:#c45e10}
.rg{display:contents}.rg>div{padding:3px 6px;font-size:9px;font-weight:700;border-bottom:2px solid var(--bd);text-align:right}
.rg>div:nth-child(1){color:var(--gn)!important}
/* Cells */
.cl{padding:2px 3px;min-height:14px;font-variant-numeric:tabular-nums;cursor:pointer;border-radius:2px;font-family:var(--mn);font-size:9px;text-align:right}
.cl:hover{background:rgba(91,141,239,.06)}.cs{color:#3a3f4a}.cc{color:#3a3f4a}
.ce{color:#3a3f4a;border-bottom:1px dashed rgba(58,63,74,.3)}.ce:hover{background:rgba(58,63,74,.06)}
.ci{width:100%;background:var(--bg);border:1px solid var(--ac);color:var(--tx);font-family:var(--mn);font-size:9px;padding:2px 3px;border-radius:2px;outline:none;text-align:right}
.ld{display:flex;flex-direction:column;align-items:center;padding:40px;gap:8px}.ld p{font-size:11px;color:var(--t2)}
.sp{width:22px;height:22px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sn .7s linear infinite}
@keyframes sn{to{transform:rotate(360deg)}}
.er{padding:6px 10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:5px;font-size:10px;color:var(--rd);margin-bottom:6px}
.em{text-align:center;padding:20px;color:var(--t2);font-size:11px}
/* SUMMARY - uses SAME grid template, label spans first 7 cols */
.sum-hdr{padding:5px 8px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;margin-top:6px;border:1px solid var(--bd);border-radius:4px 4px 0 0}
.sum-hdr-p{color:var(--ac);background:rgba(91,141,239,.06);border-color:var(--ac)}
.sum-hdr-a{color:var(--gn);background:rgba(52,211,153,.06);border-color:var(--gn)}
.sum-hdr .tog{font-size:9px;color:var(--t2);font-weight:400}
.lkr{margin-left:auto;display:flex;gap:2px}
.lk{background:#fff;border:1px solid var(--bd);border-radius:3px;padding:0 3px;cursor:pointer;font-size:9px;color:var(--t2);line-height:16px}
.lk:hover{border-color:var(--am);color:var(--am)}
.lk.on{background:#c5cad3;color:#fff;border-color:#b5bbc6}
.sum-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 4px 4px;overflow-x:auto;background:var(--s1);scrollbar-gutter:stable}
.sr{display:contents}
.sr>div{padding:2px 6px;font-size:9px;font-family:var(--mn);font-weight:400;border-bottom:1px solid rgba(45,52,80,.25);text-align:right;font-family:var(--mn)}
.sr .slbl{grid-column:1/8;text-align:left;font-family:var(--ft);font-weight:600;font-size:9px;padding-left:8px!important;white-space:normal;position:sticky;left:0;z-index:1;background:var(--s1)}
.sr-c .slbl{color:var(--ac)}.sr-e .slbl{color:var(--tx)}
.sr-t{display:contents}.sr-t>div{padding:3px 6px;font-size:9px;font-family:var(--mn);font-weight:400;font-weight:800;border-top:1px solid var(--bd);border-bottom:2px solid var(--bd);text-align:right;font-family:var(--mn)}
.sr-t .slbl{grid-column:1/8;text-align:left;font-family:var(--ft);padding-left:8px!important;position:sticky;left:0;z-index:1;background:var(--s1);white-space:normal}
/* Weeks row */
.wk-row{display:flex;align-items:center;margin:6px 0;padding:4px 8px;background:var(--s2);border:1px solid var(--bd);border-radius:4px}
.wk-label{font-size:10px;font-weight:800;color:var(--am);text-transform:uppercase;letter-spacing:.3px;min-width:160px}
.wk-vals{display:flex;gap:0;flex:1}
.wk-v{width:72px;text-align:center;font-family:var(--mn);font-size:11px;font-weight:700;color:var(--am);padding:2px 0}
/* VO */
.vw{background:#fff;border:none;margin:-10px -12px;padding:0}
.vhd{padding:4px 10px;background:var(--s2);border-bottom:2px solid var(--bd);display:flex;justify-content:flex-end;align-items:center;gap:8px}
.vhd h3{font-size:12px;font-weight:700;color:var(--pu)}
.vsc{overflow-x:auto;max-height:calc(100vh - 240px);overflow-y:auto}
/* VO/Coord flex layout — fills viewport, no grey strip at top or bottom */
.vw-fx{background:#fff;margin:-10px -12px;padding:0;display:flex;flex-direction:column;height:calc(100vh - 65px);min-height:0;overflow:hidden}
.vw-fx>*{flex-shrink:0}
.vw-fx>.vsc-fx{flex:1;min-height:0;overflow:auto;max-height:none}
.vw-fx>.em{flex:1;display:flex;align-items:center;justify-content:center}
.vt{width:100%;border-collapse:separate;border-spacing:0;font-size:9px;font-family:var(--mn);table-layout:fixed}
.vt th{text-align:center;padding:6px 8px;font-size:9px;color:var(--tx);font-weight:700;border:1px solid var(--bd);background:var(--s2);white-space:nowrap}
.vt th.tg{background:#e8f5e9;color:#2e7d32}.vt th.ty{background:#fff8e1;color:#f57f17}.vt th.tp{background:#f3e5f5;color:#7b1fa2}
.vt td{padding:4px 8px;border:1px solid var(--bd);background:#fff}
/* Browser-level virtualization — skips rendering rows outside the viewport */
.vt tbody tr{content-visibility:auto;contain-intrinsic-size:auto 24px}
.vt tr:nth-child(even) td{background:#f8f9fb}
.vt tr:hover td{background:rgba(68,114,196,.08)}
/* Coord VO read-only: solid frozen-column backgrounds (4 frozen cols) — fixes scroll-bleed */
.vt-ro td:nth-child(-n+5){background:#fff}
.vt-ro tr:nth-child(even) td:nth-child(-n+5){background:#f8f9fb}
.vt-ro tr:hover td:nth-child(-n+5){background:#e8eef9!important}
.vt-ro tr:nth-child(even):hover td:nth-child(-n+5){background:#dde5f3!important}
.vt input,.vt select{background:transparent;border:none;color:var(--tx);padding:2px 0;font-family:var(--mn);font-size:9px;outline:none;width:100%;box-sizing:border-box}
.vt input:focus,.vt select:focus{background:rgba(68,114,196,.06);border-bottom:1px solid var(--ac)}
.vt input.nm{text-align:right;width:100%}.vt input.sm{width:100%}.vt input.md{width:100%}
.sa{background:rgba(52,211,153,.15)!important;color:var(--gn)!important}.sp3{background:rgba(248,113,113,.15)!important;color:var(--rd)!important}.srej{background:rgba(107,114,128,.2)!important;color:#6b7280!important}
 
.sum-body{border:1px solid var(--bd);border-top:none;border-radius:0 0 4px 4px;overflow-x:auto;background:var(--s1);scrollbar-gutter:stable}
.slbl{grid-column:1/8;text-align:left;font-family:var(--ft);font-weight:600;font-size:9px;padding-left:8px!important;white-space:normal;position:sticky;left:0;z-index:1;background:var(--s1)}
.sr-c .slbl{color:var(--ac)}.sr-e .slbl{color:var(--tx)}
.sr-t .slbl{grid-column:1/8;text-align:left;font-family:var(--ft);font-size:9px;padding-left:8px!important;position:sticky;left:0;z-index:1;background:var(--s1);white-space:normal}
 
.ss{scrollbar-width:none;-ms-overflow-style:none}
.ss::-webkit-scrollbar{display:none}
.scroll-ctrl{overflow-x:auto;margin-top:4px;scrollbar-width:auto!important}
.scroll-ctrl::-webkit-scrollbar{height:10px!important;display:block!important}
.scroll-ctrl::-webkit-scrollbar-track{background:var(--s2);border-radius:4px}
.scroll-ctrl::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
.scroll-ctrl::-webkit-scrollbar-thumb:hover{background:var(--t2)}
 
/* FREEZE PANES - first 7 columns sticky */
.gh>div:nth-child(1),.pr>div:nth-child(1),.rw>div:nth-child(1),.rg>div:nth-child(1){position:sticky;left:0;z-index:6}
.gh>div:nth-child(2),.pr>div:nth-child(2),.rw>div:nth-child(2),.rg>div:nth-child(2){position:sticky;left:240px;z-index:6}
.gh>div:nth-child(3),.pr>div:nth-child(3),.rw>div:nth-child(3),.rg>div:nth-child(3){position:sticky;left:312px;z-index:6}
.gh>div:nth-child(4),.pr>div:nth-child(4),.rw>div:nth-child(4),.rg>div:nth-child(4){position:sticky;left:374px;z-index:6}
.gh>div:nth-child(5),.pr>div:nth-child(5),.rw>div:nth-child(5),.rg>div:nth-child(5){position:sticky;left:439px;z-index:6}
.gh>div:nth-child(6),.pr>div:nth-child(6),.rw>div:nth-child(6),.rg>div:nth-child(6){position:sticky;left:511px;z-index:6}
.gh>div:nth-child(7),.pr>div:nth-child(7),.rw>div:nth-child(7),.rg>div:nth-child(7){position:sticky;left:583px;z-index:6;border-right:2px solid var(--bd)}
/* Header z-index higher */
.gh>div:nth-child(-n+7){z-index:6}
/* Backgrounds must be opaque for freeze to work */
.gh>div:nth-child(-n+7){background:var(--s2)}
.pr>div:nth-child(-n+7){background:#f9f9f7}
.pg:nth-child(even) .pr>div:nth-child(-n+7){background:#f9f9f7}
.rw>div:nth-child(-n+7),.rg>div:nth-child(-n+7){background:#fff}
.rw>div:nth-child(-n+7),.rg>div:nth-child(-n+7){background:#fff}
 
/* Center monthly columns */
.gh>div:nth-child(n+8){text-align:center;color:var(--tx)}
.pr>div:nth-child(n+8),.rw>div:nth-child(n+8),.rg>div:nth-child(n+8){text-align:right}
/* Row + Column highlight */
 
 
 
 
/* Sidebar */
.sb-toggle{background:none;border:1px solid var(--bd);color:var(--t2);font-size:16px;cursor:pointer;padding:2px 8px;border-radius:4px;line-height:1}
.sb-toggle:hover{color:var(--tx);border-color:var(--ac)}
.sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:var(--s1);border-right:1px solid var(--bd);z-index:50;transform:translateX(-100%);transition:transform .2s ease;display:flex;flex-direction:column;padding:16px 0}
.sidebar.open{transform:translateX(0)}
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:49;display:none}
.sb-overlay.open{display:block}
.sb-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);margin-bottom:8px}
.sb-hdr h2{font-size:14px;font-weight:800;color:var(--ac)}
.sb-close{background:none;border:none;color:var(--t2);font-size:18px;cursor:pointer}.sb-close:hover{color:var(--tx)}
.sb-menu{flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.sb-item:hover{background:var(--s2);color:var(--tx)}
.sb-item.active{background:rgba(91,141,239,.08);color:var(--ac);border-left-color:var(--ac)}
.sb-item .sb-ico{font-size:16px;width:22px;text-align:center}
.sb-item .sb-badge{margin-left:auto;font-size:9px;background:var(--s3);padding:1px 6px;border-radius:8px;color:var(--t2)}
.sb-divider{height:1px;background:var(--bd);margin:8px 16px}
.sb-footer{padding:10px 16px;font-size:9px;color:var(--t2);border-top:1px solid var(--bd)}
/* Alternate row shading */
.pg:nth-child(even) .pr>div{background:#f9f9f7}
.pg:nth-child(even) .pr>div:nth-child(-n+7){background:#f9f9f7}
.pg:nth-child(even) .pr>div:nth-child(-n+7){background:#f9f9f7}
.rw>div:nth-child(-n+7),.rg>div:nth-child(-n+7){background:#fff}
/* Current month highlight */
.cur-month{background:var(--ac)!important;color:#fff!important;border-left:2px solid var(--ac)!important;border-right:2px solid var(--ac)!important;font-weight:800!important}
/* Status filter */
.sf{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 8px;border-radius:4px;font-family:var(--ft);font-size:10px;outline:none;cursor:pointer}
.sf:focus{border-color:var(--ac)}
.sb-logo{width:160px;height:36px;background:url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNjAgMzYiPjx0ZXh0IHg9IjAiIHk9IjI1IiBmb250LWZhbWlseT0iT3V0Zml0LCBzYW5zLXNlcmlmIiBmb250LXNpemU9IjE4IiBmb250LXdlaWdodD0iODAwIiBmaWxsPSIjNDQ3MmM0Ij5Qcm9saW5lPC90ZXh0Pjwvc3ZnPg==") center/contain no-repeat;flex-shrink:0}
 
/* Tabular nums for all number cells */
[style*="font-family:var(--mn)"]{font-variant-numeric:tabular-nums}
