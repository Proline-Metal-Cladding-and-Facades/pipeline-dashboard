<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pipeline Mastersheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e13;--s1:#131720;--s2:#1b2030;--s3:#252b3d;--bd:#2d3450;--tx:#e6eaf2;--t2:#7d89a6;--ac:#5b8def;--a2:#3d6fd9;--gn:#34d399;--am:#fbbf24;--rd:#f87171;--pu:#a78bfa;--ft:'Outfit',sans-serif;--mn:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:var(--ft)}
.np{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.nc{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:32px;max-width:380px;width:90%;text-align:center}
.nc h2{font-size:20px;font-weight:800;margin:10px 0 4px}.nc p{font-size:11px;color:var(--t2);margin-bottom:12px}
.nin{width:100%;padding:10px;border-radius:8px;border:2px solid var(--bd);background:var(--bg);color:var(--tx);font-family:var(--ft);font-size:15px;text-align:center;outline:none;margin-bottom:10px}
.nin:focus{border-color:var(--ac)}.nin::placeholder{color:#4a5270}
.nbt{width:100%;padding:10px;border-radius:8px;border:none;background:var(--a2);color:#fff;font-family:var(--ft);font-size:13px;font-weight:700;cursor:pointer}
.nbt:hover:not(:disabled){background:var(--ac)}.nbt:disabled{opacity:.3}
.app{padding:8px 10px}.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:5px}
.hl{display:flex;align-items:center;gap:6px}.hl h1{font-size:16px;font-weight:800}
.dot{width:6px;height:6px;border-radius:50%;animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.dx{font-size:9px;font-weight:600}.hr{display:flex;align-items:center;gap:5px}
.ub{background:var(--s2);border:1px solid var(--bd);padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600}
.sv{font-size:8px;color:var(--t2)}.rb{padding:2px 7px;border-radius:3px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font-size:9px;font-weight:600;cursor:pointer;font-family:var(--ft)}
.rb:hover{color:var(--tx);border-color:var(--ac)}
.cds{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:4px;margin-bottom:6px}
.cd{background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:6px 8px}
.cd.se{border-color:var(--pu);background:rgba(167,139,250,.05)}
.cd .lb{font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;font-weight:700}
.cd .vl{font-size:14px;font-weight:800;font-family:var(--mn);margin-top:1px}.cd .sb{font-size:7px;color:var(--t2)}
.br{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.pl{padding:3px 9px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--t2);font-family:var(--ft);font-size:9px;font-weight:600;cursor:pointer}
.pl.on{background:var(--a2);border-color:var(--a2);color:#fff}.pl:hover:not(.on){border-color:var(--t2);color:var(--tx)}
.pl.gn{border-color:var(--gn);color:var(--gn)}.pl.gn:hover{background:var(--gn);color:var(--bg)}
.dv{width:1px;height:14px;background:var(--bd);margin:0 2px}
.sx{flex:1;min-width:100px;padding:3px 7px;border-radius:3px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-family:var(--ft);font-size:9px;outline:none}
.sx:focus{border-color:var(--ac)}.sx::placeholder{color:var(--t2)}
.af{background:var(--s2);border:1px solid var(--bd);border-radius:5px;padding:7px;margin-bottom:5px;display:flex;gap:5px;flex-wrap:wrap;align-items:end}
.af label{font-size:7px;color:var(--t2);display:block;text-transform:uppercase;font-weight:700}
.af input{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:3px 6px;border-radius:3px;font-family:var(--ft);font-size:9px;outline:none}
.af input:focus{border-color:var(--ac)}
.ht{padding:4px 7px;background:rgba(91,141,239,.05);border:1px solid rgba(91,141,239,.12);border-radius:4px;font-size:8px;color:var(--t2);margin-bottom:4px;line-height:1.4}
.ht b{color:var(--ac)}
.mn2{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.mn2 button{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:2px 5px;border-radius:3px;cursor:pointer;font-size:8px;font-weight:600;font-family:var(--ft)}
.mn2 button:hover{color:var(--tx)}.mn2 span{font-size:8px;color:var(--t2)}
.gc{overflow-x:auto;border:1px solid var(--bd);border-radius:4px;background:var(--s1)}
.g{display:grid;min-width:fit-content}
.gh{display:contents}
.gh>div{position:sticky;top:0;z-index:3;background:var(--s2);padding:3px 4px;font-size:7px;color:var(--t2);text-transform:uppercase;letter-spacing:.2px;font-weight:700;border-bottom:2px solid var(--bd);text-align:right;cursor:pointer;user-select:none}
.gh>div:hover{color:var(--tx);background:var(--s3)}
.gh>div:first-child{text-align:left;position:sticky;left:0;z-index:4;min-width:150px;cursor:default}
.gh>div.ms{color:var(--pu);background:rgba(167,139,250,.1);border-bottom-color:var(--pu)}
.pg{display:contents}
.pn{display:contents}.pn>div{padding:3px 4px;font-size:10px;font-weight:700;background:var(--s3);border-top:2px solid rgba(91,141,239,.3);color:var(--ac)}.pn>div:first-child{position:sticky;left:0;z-index:2;display:flex;align-items:center;gap:3px}
.pne{cursor:pointer;border-bottom:1px dashed rgba(91,141,239,.3)}.pne:hover{color:var(--am)}
.xb{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px;opacity:.3}.xb:hover{color:var(--rd);opacity:1}
.rw{display:contents}.rw>div{padding:1px 4px;font-size:9px;border-bottom:1px solid rgba(45,52,80,.3);text-align:right}
.rl{text-align:left!important;font-family:var(--ft);font-weight:500;position:sticky;left:0;z-index:1;background:var(--s1);padding-left:12px!important;font-size:9px}
.r0 .rl{color:var(--ac)}.r1 .rl,.r2 .rl,.r3 .rl{color:var(--rd)}
.rg{display:contents}.rg>div{padding:1px 4px;font-size:9px;font-weight:700;border-bottom:2px solid var(--bd);text-align:right}.rg .rl{color:var(--gn)!important}
.cl{padding:1px 2px;min-height:15px;cursor:pointer;border-radius:2px;font-family:var(--mn);font-size:9px;text-align:right}
.cl:hover{background:rgba(91,141,239,.06)}.cs{color:var(--tx)}.cc{color:var(--rd)}
.ce{color:var(--am);border-bottom:1px dashed rgba(251,191,36,.3)}.ce:hover{background:rgba(251,191,36,.06)}
.ci{width:100%;background:var(--bg);border:1px solid var(--ac);color:var(--tx);font-family:var(--mn);font-size:9px;padding:1px 2px;border-radius:2px;outline:none;text-align:right}
.cin{width:100%;background:var(--bg);border:1px solid var(--ac);color:var(--tx);font-family:var(--ft);font-size:9px;padding:1px 3px;border-radius:2px;outline:none}
.ld{display:flex;flex-direction:column;align-items:center;padding:40px;gap:8px}.ld p{font-size:10px;color:var(--t2)}
.sp2{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sn .7s linear infinite}
@keyframes sn{to{transform:rotate(360deg)}}
.er{padding:5px 8px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:4px;font-size:9px;color:var(--rd);margin-bottom:5px}
.em{text-align:center;padding:16px;color:var(--t2);font-size:10px}
.db{padding:2px 6px;background:var(--s2);border:1px solid var(--bd);border-radius:3px;font-size:7px;color:var(--t2);margin-bottom:4px;font-family:var(--mn);word-break:break-all;max-height:60px;overflow:auto}
.vw{border:1px solid var(--bd);border-radius:4px;background:var(--s1);overflow:hidden}
.vhd{padding:6px 10px;background:var(--s2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}
.vhd h3{font-size:11px;font-weight:700;color:var(--pu)}
.vsc{overflow-x:auto;max-height:58vh;overflow-y:auto}
.vt{width:100%;border-collapse:collapse;font-size:9px}
.vt th{text-align:left;padding:4px 6px;font-size:7px;color:var(--t2);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--bd);background:var(--s2);position:sticky;top:0;z-index:1;white-space:nowrap}
.vt th.tg{border-top:2px solid var(--gn)}.vt th.ty{border-top:2px solid var(--am)}.vt th.tp{border-top:2px solid var(--pu)}
.vt td{padding:3px 6px;border-bottom:1px solid rgba(45,52,80,.3)}
.vt input,.vt select{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:1px 3px;border-radius:2px;font-family:var(--ft);font-size:9px;outline:none}
.vt input:focus,.vt select:focus{border-color:var(--ac)}
.vt input.nm{text-align:right;font-family:var(--mn);width:70px}.vt input.sm{width:60px}.vt input.md{width:110px}
.sa{background:rgba(52,211,153,.15)!important;color:var(--gn)!important}.sp3{background:rgba(248,113,113,.15)!important;color:var(--rd)!important}.sr{background:rgba(107,114,128,.2)!important;color:var(--gr)!important}
</style></head><body><div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect,useCallback,useRef}=React;
const API="https://script.google.com/macros/s/AKfycbxZSeOefNZ7nPHiq_Y7ZJNUnIGgfXe8p89KNGLQWhyNdS1SDFy0ZZu5_MdWyc1jrrpFDw/exec";
const MO=["Jan-25","Feb-25","Mar-25","Apr-25","May-25","Jun-25","Jul-25","Aug-25","Sep-25","Oct-25","Nov-25","Dec-25","Jan-26","Feb-26","Mar-26","Apr-26","May-26","Jun-26","Jul-26","Aug-26","Sep-26","Oct-26","Nov-26","Dec-26"];
const RN=["Sales","External Materials","ProFab Materials","Other Costs"];
const RK=["Sales","ExtMaterials","ProfabMaterials","OtherCosts"];
const BK=["_BDG_CONTRACT","_BDG_VAR"];// special month keys for cost budgets
const UK="pipeline-v5";
const isAp=s=>String(s||"").toUpperCase().includes("APPROVED");
const isPn=s=>{const u=String(s||"").toUpperCase();return u.includes("PENDING")||u.includes("PRICED")};
const isRj=s=>{const u=String(s||"").toUpperCase();return u.includes("REJECTED")||u.includes("NOT PROCEEDING")};
const sC=s=>isAp(s)?"sa":isPn(s)?"sp3":isRj(s)?"sr":"";

async function aG(a){try{const r=await fetch(API+"?action="+a+"&t="+Date.now(),{redirect:"follow"});const t=await r.text();console.log("RAW["+a+"]:",t.substring(0,800));return JSON.parse(t)}catch(e){console.error(e);return null}}
async function aP(p){try{await fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)});return true}catch{return false}}

const fm=v=>v?Number(v).toLocaleString("en-AU",{maximumFractionDigits:0}):"";
const fK=v=>{if(!v)return"-";const a=Math.abs(v);return(v<0?"-":"")+"$"+(a>=1e6?(a/1e6).toFixed(1)+"M":a>=1e3?(a/1e3).toFixed(0)+"K":String(Math.round(a)))};
const N=v=>Number(v)||0;

// Ultra-flexible field getter: strips ALL spaces, underscores, dots and compares lowercase
function F(obj,...names){
  const norm=s=>String(s).toLowerCase().replace(/[\s_.\-]+/g,"");
  const keys=Object.keys(obj);
  for(const n of names){
    // exact match first
    if(obj[n]!==undefined&&obj[n]!=="")return obj[n];
    // normalized match
    const nn=norm(n);
    for(const k of keys){if(norm(k)===nn&&obj[k]!==""&&obj[k]!==undefined)return obj[k]}
  }
  return "";
}

function EC({value,onChange,cls}){
  const[e,sE]=useState(false);const[d,sD]=useState("");const r=useRef();
  useEffect(()=>{if(e&&r.current)r.current.focus()},[e]);
  const c=()=>{sE(false);const n=parseFloat(d.replace(/,/g,""))||0;if(n!==(value||0))onChange(n)};
  if(e)return<input ref={r} className="ci" value={d} onChange={x=>sD(x.target.value)} onBlur={c} onKeyDown={x=>{if(x.key==="Enter")c();if(x.key==="Escape")sE(false)}}/>;
  return<div className={cls||"cl cs"} onDoubleClick={()=>{sD(value?String(value):"");sE(true)}}>{value?fm(value):""}</div>
}

function EN({value,onSave}){
  const[e,sE]=useState(false);const[d,sD]=useState("");const r=useRef();
  useEffect(()=>{if(e&&r.current){r.current.focus();r.current.select()}},[e]);
  const c=()=>{sE(false);if(d.trim()&&d.trim()!==value)onSave(d.trim())};
  if(e)return<input ref={r} className="cin" value={d} onChange={x=>sD(x.target.value)} onBlur={c} onKeyDown={x=>{if(x.key==="Enter")c();if(x.key==="Escape")sE(false)}}/>;
  return<span className="pne" onDoubleClick={()=>{sD(value);sE(true)}}>{value}</span>
}

function App(){
const[un,sU]=useState(localStorage.getItem(UK)||"");const[ni,sNi]=useState("");
const[ld,sLd]=useState(true);const[sv,sSv]=useState(false);const[ls,sLs]=useState(null);
const[pj,sPj]=useState([]);const[mo,sMo]=useState({});const[vo,sVo]=useState([]);
const[vw,sVw]=useState("grid");const[sr,sSr]=useState("");const[sc,sSc]=useState(12);
const[sa,sSa]=useState(false);const[nn,sNn]=useState("");const[nc,sNc]=useState("");
const[er,sEr]=useState(null);const[db,sDb]=useState("");const[sav,sSav]=useState(false);
const[selM,sSM]=useState([]);
const[nvo,sNvo]=useState({project:"",type:"VO",varNo:"",varName:"",ds:"",da:"",price:0,status:"",em:0,pf:0});
const sub=n=>{localStorage.setItem(UK,n);sU(n)};
const togM=m=>sSM(p=>p.includes(m)?p.filter(x=>x!==m):[...p,m]);

const load=useCallback(async()=>{
  sLd(true);sEr(null);sDb("");
  const r=await aG("getAll");
  if(!r){sEr("No response. Check Apps Script: Deploy > Manage deployments > Edit > New version > Deploy");sLd(false);return}
  if(r.error){sEr("Script error: "+r.error);sLd(false);return}
  const pD=r.projects||[],mD=r.monthly||[],vD=r.voRegister||[];
  // Debug: show raw keys
  let dbg=pD.length+"p "+mD.length+"m "+vD.length+"v";
  if(pD[0])dbg+=" | ProjKeys:"+Object.keys(pD[0]).join(",");
  if(mD[0])dbg+=" | MonthKeys:"+Object.keys(mD[0]).join(",");
  sDb(dbg);

  sPj(pD.map(p=>({
    nm:String(F(p,"Project","project","PROJECT","Title","NAME")).trim(),
    cp:N(F(p,"ContractPrice","Contract Price","CONTRACT PRICE","contractprice","Contract","CONTRACT")),
    v:N(F(p,"Variations","VARIATIONS","variations","Variation")),
    st:String(F(p,"Status","STATUS","status"))||"Active"
  })));

  const mm={};
  mD.forEach(row=>{
    const pn=String(F(row,"Project","project","PROJECT","Title")).trim();
    const mn=String(F(row,"Month","month","MONTH")).trim();
    if(!pn||!mn)return;
    mm[pn+"|||"+mn]={
      Sales:N(F(row,"Sales","sales","SALES")),
      ExtMaterials:N(F(row,"ExtMaterials","extmaterials","Ext Materials","External Materials","EXTERNAL MATERIALS","EXTMATERIALS")),
      ProfabMaterials:N(F(row,"ProfabMaterials","profabmaterials","Profab Materials","ProFab Materials","PFAB MATERIALS","PFABMATERIALS")),
      OtherCosts:N(F(row,"OtherCosts","othercosts","Other Costs","OTHER COSTS","OTHERCOSTS"))
    };
  });
  sMo(mm);

  sVo(vD.map((v,i)=>({i,_r:v._row!==undefined?v._row:i,
    pj:String(F(v,"PROJECT","Project")).trim(),ty:String(F(v,"TYPE","Type")),
    vn:String(F(v,"VARIATION NO.","VARIATION NO","Variation No.")),vnm:String(F(v,"VARIATION NAME","Variation Name")),
    ds:String(F(v,"DATE SUBMITTED","Date Submitted")),da:String(F(v,"DATE APPROVED","Date Approved")),
    pr:N(F(v,"PRICE","Price","REVENUE","Revenue")),st:String(F(v,"STATUS","Status")),
    em:N(F(v,"EXTERNAL MATERIALS","External Materials")),pf:N(F(v,"PFAB MATERIALS","Pfab Materials")),
    nmn:N(F(v,"NO. OF MEN","No. of Men")),nh:N(F(v,"NORMAL HOURS","Normal Hours")),
    nr:N(F(v,"NORMAL RATE","Normal Rate")),oh:N(F(v,"OVERTIME HOURS","Overtime Hours")),
    or2:N(F(v,"OVERTIME RATE","Overtime Rate"))
  })));
  sLd(false);
},[]);

useEffect(()=>{if(un)load()},[un,load]);
const gv=(p,m,c)=>mo[p+"|||"+m]?.[c]||0;
// Get budget value for cost rows (stored with special month key)
const gb=(p,budgetKey,col)=>mo[p+"|||"+budgetKey]?.[col]||0;

const voP=useMemo(()=>{const m={};vo.forEach(v=>{if(isAp(v.st))m[v.pj]=(m[v.pj]||0)+v.pr});return m},[vo]);

const uC=useCallback(async(p,m,c,val)=>{
  sMo(pr=>({...pr,[p+"|||"+m]:{...(pr[p+"|||"+m]||{}),[c]:val}}));
  sSv(true);await aP({action:"updateCell",project:p,month:m,column:c,value:val,editedBy:un,editedAt:new Date().toLocaleString("en-AU")});
  sLs(new Date());sSv(false);
},[un]);

const uP=useCallback(async(nm,fd,val)=>{
  sPj(pr=>pr.map(p=>p.nm===nm?{...p,[fd.toLowerCase().includes("contract")?"cp":"v"]:val}:p));
  sSv(true);await aP({action:"updateProject",name:nm,field:fd,value:val});
  sLs(new Date());sSv(false);
},[]);

const renP=useCallback(async(old,nw)=>{
  sPj(pr=>pr.map(p=>p.nm===old?{...p,nm:nw}:p));
  sMo(prev=>{const next={};Object.entries(prev).forEach(([k,v])=>{next[k.startsWith(old+"|||")?nw+"|||"+k.split("|||")[1]:k]=v});return next});
  sSv(true);await aP({action:"updateProject",name:old,field:"Project",value:nw});
  sLs(new Date());sSv(false);
},[]);

const uV=useCallback(async(vi,fd,val)=>{const v=vo[vi];if(!v)return;sVo(pr=>pr.map((x,i)=>i===vi?{...x,[fd]:val}:x));const m={"pj":"PROJECT","ty":"TYPE","vn":"VARIATION NO.","vnm":"VARIATION NAME","ds":"DATE SUBMITTED","da":"DATE APPROVED","pr":"PRICE","st":"STATUS","em":"EXTERNAL MATERIALS","pf":"PFAB MATERIALS","nmn":"NO. OF MEN","nh":"NORMAL HOURS","nr":"NORMAL RATE","oh":"OVERTIME HOURS","or2":"OVERTIME RATE"};sSv(true);await aP({action:"updateVO",row:v._r,field:m[fd]||fd,value:val});sLs(new Date());sSv(false)},[vo]);
const addV=async()=>{if(!nvo.project)return;sSv(true);await aP({action:"addVO",project:nvo.project,type:nvo.type,varNo:(nvo.type==="DL"?"DL-":"VO-")+nvo.varNo,varName:nvo.varName,dateSubmitted:nvo.ds,dateApproved:nvo.da,price:nvo.price,status:nvo.status,extMaterials:nvo.em,pfabMaterials:nvo.pf,margin:nvo.price-nvo.em-nvo.pf});sSav(false);sNvo({project:"",type:"VO",varNo:"",varName:"",ds:"",da:"",price:0,status:"",em:0,pf:0});sSv(false);sLs(new Date());setTimeout(load,1500)};
const aPj=async()=>{if(!nn.trim())return;const c=parseFloat(nc.replace(/,/g,""))||0;sSv(true);await aP({action:"addProject",name:nn.trim(),contractPrice:c,variations:0});sPj(p=>[...p,{nm:nn.trim(),cp:c,v:0,st:"Active"}]);sNn("");sNc("");sSa(false);sSv(false);sLs(new Date())};
const dPj=async nm=>{if(!confirm('Delete "'+nm+'"?'))return;sSv(true);await aP({action:"deleteProject",name:nm});sPj(p=>p.filter(x=>x.nm!==nm));sMo(p=>{const x={...p};Object.keys(x).forEach(k=>{if(k.startsWith(nm+"|||"))delete x[k]});return x});sSv(false);sLs(new Date())};

// COMPUTED: each row type gets contract, var, total, claimed, toAlloc
const comp=useMemo(()=>pj.map((p,i)=>{
  const rows=RK.map((rk,ri)=>{
    let claimed=0;MO.forEach(m=>{claimed+=gv(p.nm,m,rk)});
    // For Sales: contract=project contract, var=project var, avo=from VO register
    // For cost rows: contract/var stored as budget keys
    let con,vr,avo=0;
    if(ri===0){con=p.cp;vr=p.v;avo=voP[p.nm]||0}
    else{con=gb(p.nm,BK[0],rk);vr=gb(p.nm,BK[1],rk)}
    const tot=con+vr+avo;
    const tba=tot-claimed;
    return{rk,ri,con,vr,avo,tot,claimed,tba};
  });
  // GP = Sales total - Ext total - ProFab total - Other total
  const gpTot=rows[0].tot-rows[1].tot-rows[2].tot-rows[3].tot;
  return{...p,i,rows,gpTot};
}),[pj,mo,voP]);

const flt=useMemo(()=>{if(!sr)return comp;const q=sr.toLowerCase();return comp.filter(p=>p.nm.toLowerCase().includes(q))},[comp,sr]);
const vis=MO.slice(sc,sc+12);

// Cards
const cd=useMemo(()=>{
  const ms=selM.length>0?selM:null;
  let con=0,sal=0,ext=0,pfb=0,oth=0;
  comp.forEach(p=>{
    con+=p.rows[0].tot;// sales total = contract+var+VOs
    if(ms){ms.forEach(m=>{sal+=gv(p.nm,m,"Sales");ext+=gv(p.nm,m,"ExtMaterials");pfb+=gv(p.nm,m,"ProfabMaterials");oth+=gv(p.nm,m,"OtherCosts")})}
    else{sal+=p.rows[0].claimed;ext+=p.rows[1].claimed;pfb+=p.rows[2].claimed;oth+=p.rows[3].claimed}
  });
  const costs=ext+pfb+oth;
  return{con,sal,ext,pfb,oth,costs,gp:sal-costs,label:ms?ms.join(", "):"All months"};
},[selM,comp,mo]);

if(!un)return<div className="np"><div className="nc"><div style={{fontSize:40}}>👤</div><h2>Welcome to Pipeline</h2><p>Enter your name so the team knows who made each edit.</p><input className="nin" placeholder="e.g. Jake, Sarah..." value={ni} onChange={e=>sNi(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&ni.trim())sub(ni.trim())}} autoFocus/><button className="nbt" disabled={!ni.trim()} onClick={()=>sub(ni.trim())}>Enter Dashboard →</button></div></div>;

const gC="150px 75px 65px 68px 78px 78px 68px "+vis.map(()=>"72px").join(" ");

return<div className="app">
<div className="hd"><div className="hl"><h1>Pipeline Mastersheet</h1><span className="dot" style={{background:sv?"var(--am)":"var(--gn)"}}/><span className="dx" style={{color:sv?"var(--am)":"var(--gn)"}}>{sv?"Saving...":"Connected"}</span></div>
<div className="hr"><span className="ub">👤 {un}</span>{ls&&<span className="sv">Saved {ls.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"})}</span>}<button className="rb" onClick={load}>↻ Sync</button></div></div>
{er&&<div className="er">{er}</div>}
{db&&<div className="db">{db}</div>}
{ld?<div className="ld"><div className="sp2"/><p>Loading...</p></div>:<>
{selM.length>0&&<div style={{fontSize:8,color:"var(--pu)",fontWeight:700,marginBottom:3}}>Filtered: {cd.label} <button style={{background:"none",border:"none",color:"var(--t2)",cursor:"pointer",fontSize:8,fontFamily:"var(--ft)"}} onClick={()=>sSM([])}>✕ Clear</button></div>}
<div className="cds">
<div className="cd"><div className="lb">Total Contract</div><div className="vl" style={{color:"var(--ac)"}}>{fK(cd.con)}</div><div className="sb">{comp.length} projects</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">Revenue</div><div className="vl">{fK(cd.sal)}</div><div className="sb">{cd.label}</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">Ext. Materials</div><div className="vl" style={{color:"var(--rd)"}}>{fK(cd.ext)}</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">ProFab Mat.</div><div className="vl" style={{color:"var(--rd)"}}>{fK(cd.pfb)}</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">Other Costs</div><div className="vl" style={{color:"var(--rd)"}}>{fK(cd.oth)}</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">Total Costs</div><div className="vl" style={{color:"var(--am)"}}>{fK(cd.costs)}</div></div>
<div className={"cd"+(selM.length?" se":"")}><div className="lb">Gross Profit</div><div className="vl" style={{color:"var(--gn)"}}>{fK(cd.gp)}</div><div className="sb">{cd.sal?((cd.gp/cd.sal)*100).toFixed(0)+"%":""}</div></div>
</div>

<div className="br">
{[["grid","Pipeline"],["vos","VO Register"]].map(([k,l])=><button key={k} className={"pl "+(vw===k?"on":"")} onClick={()=>sVw(k)}>{l}</button>)}
<div className="dv"/><button className="pl gn" onClick={()=>sSa(!sa)}>+ Project</button>
<input className="sx" placeholder="Search..." value={sr} onChange={e=>sSr(e.target.value)}/>
</div>
{sa&&<div className="af"><div><label>Project</label><input value={nn} onChange={e=>sNn(e.target.value)} placeholder="2140 - Project" style={{width:200}}/></div><div><label>Contract</label><input value={nc} onChange={e=>sNc(e.target.value)} placeholder="500000" style={{width:90}}/></div><button className="pl gn" onClick={aPj}>Add</button><button className="pl" onClick={()=>sSa(false)}>Cancel</button></div>}

{vw==="grid"&&<>
<div className="ht"><b>Double-click</b> any cell to edit (names, numbers). <span style={{color:"var(--am)"}}>Gold</span>=editable. <span style={{color:"var(--pu)"}}>Purple</span>=auto VO Register. Click <b>month headers</b> to multi-filter cards. GP = Sales Total - Ext Total - ProFab Total - Other Total.</div>
<div className="mn2"><button onClick={()=>sSc(Math.max(0,sc-3))}>←</button><span>{vis[0]}—{vis[vis.length-1]}</span><button onClick={()=>sSc(Math.min(12,sc+3))}>→</button><div style={{flex:1}}/><button onClick={()=>sSc(0)}>25</button><button onClick={()=>sSc(12)}>26</button>{selM.length>0&&<button onClick={()=>sSM([])} style={{color:"var(--pu)"}}>Clear</button>}</div>
<div className="gc" style={{maxHeight:"62vh",overflowY:"auto"}}><div className="g" style={{gridTemplateColumns:gC}}>
<div className="gh"><div>Project</div><div style={{color:"var(--am)"}}>Contract</div><div style={{color:"var(--am)"}}>Var.</div><div style={{color:"var(--pu)"}}>Appr.VOs</div><div>Total</div><div>Claimed</div><div>To Alloc.</div>
{vis.map(m=><div key={m} className={selM.includes(m)?"ms":""} onClick={()=>togM(m)}>{m}</div>)}</div>

{flt.map(p=>{
  return<div className="pg" key={p.i}>
  {/* Project name */}
  <div className="pn"><div><button className="xb" onClick={()=>dPj(p.nm)}>×</button><EN value={p.nm} onSave={nw=>renP(p.nm,nw)}/></div><div/><div/><div/><div/><div/><div/>{vis.map(m=><div key={m}/>)}</div>

  {/* 4 data rows: Sales, Ext, ProFab, Other */}
  {p.rows.map((row,ri)=>{
    const isSales=ri===0;
    return<div className={"rw r"+ri} key={ri}>
    <div className="rl">{RN[ri]}</div>
    {/* Contract col */}
    <div>{isSales?
      <EC value={row.con} onChange={v=>uP(p.nm,"Contract Price",v)} cls="cl ce"/>:
      <EC value={row.con} onChange={v=>uC(p.nm,BK[0],RK[ri],v)} cls="cl ce"/>
    }</div>
    {/* Var col */}
    <div>{isSales?
      <EC value={row.vr} onChange={v=>uP(p.nm,"Variations",v)} cls="cl ce"/>:
      <EC value={row.vr} onChange={v=>uC(p.nm,BK[1],RK[ri],v)} cls="cl ce"/>
    }</div>
    {/* Appr.VOs */}
    <div style={{fontFamily:"var(--mn)",fontSize:9,color:"var(--pu)",fontStyle:"italic"}}>{isSales&&row.avo?fm(row.avo):"-"}</div>
    {/* Total */}
    <div style={{fontFamily:"var(--mn)",fontSize:9,fontWeight:700}}>{fm(row.tot)}</div>
    {/* Claimed */}
    <div style={{fontFamily:"var(--mn)",fontSize:9}}>{fm(row.claimed)}</div>
    {/* To Alloc */}
    <div style={{fontFamily:"var(--mn)",fontSize:9,color:row.tba<0?"var(--rd)":row.tba>0?"var(--am)":"var(--gn)"}}>{fm(row.tba)}</div>
    {/* Monthly */}
    {vis.map(m=><div key={m}><EC value={gv(p.nm,m,RK[ri])} onChange={val=>uC(p.nm,m,RK[ri],val)} cls={isSales?"cl cs":"cl cc"}/></div>)}
    </div>
  })}

  {/* Gross Profit row */}
  <div className="rg">
  <div className="rl" style={{color:"var(--gn)"}}>Gross Profit</div>
  <div/><div/><div/>
  <div style={{fontFamily:"var(--mn)",fontSize:9,color:p.gpTot<0?"var(--rd)":"var(--gn)"}}>{fm(p.gpTot)}</div>
  <div/><div/>
  {vis.map(m=>{const v=gv(p.nm,m,"Sales")-gv(p.nm,m,"ExtMaterials")-gv(p.nm,m,"ProfabMaterials")-gv(p.nm,m,"OtherCosts");return<div key={m} style={{fontFamily:"var(--mn)",fontSize:8,color:v<0?"var(--rd)":"var(--gn)",fontWeight:600}}>{v?fm(v):""}</div>})}
  </div>
  </div>
})}
</div></div>
{flt.length===0&&<div className="em">{pj.length===0?"No projects.":"No match."}</div>}
</>}

{vw==="vos"&&<div className="vw">
<div className="vhd"><h3>VO / DL Register</h3><div style={{display:"flex",gap:4,alignItems:"center"}}>
<span style={{fontSize:9,color:"var(--t2)"}}>{vo.length} entries · Approved: {fK(Object.values(voP).reduce((s,v)=>s+v,0))}</span>
<button className="pl gn" onClick={()=>sSav(!sav)}>+ Add</button></div></div>
{sav&&<div className="af" style={{margin:6}}>
<div><label>Project</label><select value={nvo.project} onChange={e=>sNvo({...nvo,project:e.target.value})} style={{minWidth:130}}><option value="">Select</option>{pj.map(p=><option key={p.nm} value={p.nm}>{p.nm}</option>)}</select></div>
<div><label>Type</label><select value={nvo.type} onChange={e=>sNvo({...nvo,type:e.target.value})}><option>VO</option><option>DL</option></select></div>
<div><label>{nvo.type}-No</label><input value={nvo.varNo} onChange={e=>sNvo({...nvo,varNo:e.target.value.substring(0,10)})} style={{width:60}}/></div>
<div><label>Name</label><input value={nvo.varName} onChange={e=>sNvo({...nvo,varName:e.target.value.substring(0,100)})} style={{width:140}}/></div>
<div><label>Price</label><input type="number" value={nvo.price||""} onChange={e=>sNvo({...nvo,price:N(e.target.value)})} style={{width:70}}/></div>
<div><label>Status</label><input value={nvo.status} onChange={e=>sNvo({...nvo,status:e.target.value})} style={{width:90}}/></div>
<button className="pl gn" onClick={addV}>Add</button><button className="pl" onClick={()=>sSav(false)}>Cancel</button></div>}
{vo.length===0?<div className="em">No entries.</div>:
<div className="vsc"><table className="vt"><thead><tr>
<th className="tg">Project</th><th className="tg">Type</th><th className="tg">Var No.</th><th className="tg">Name</th>
<th className="tg">Date Sub.</th><th className="tg">Date Appr.</th><th className="tg" style={{textAlign:"right"}}>Price</th><th className="tg">Status</th>
<th className="ty" style={{textAlign:"right"}}>Ext.Mat</th><th className="ty" style={{textAlign:"right"}}>PFAB</th><th className="ty" style={{textAlign:"right"}}>Margin</th>
<th className="tp" style={{textAlign:"right"}}>#Men</th><th className="tp" style={{textAlign:"right"}}>NHrs</th><th className="tp" style={{textAlign:"right"}}>NRate</th><th className="tp" style={{textAlign:"right"}}>OTHrs</th><th className="tp" style={{textAlign:"right"}}>OTRate</th>
</tr></thead><tbody>{vo.map((v,vi)=>{const mg=v.pr-v.em-v.pf;return<tr key={vi}>
<td><select value={v.pj} onChange={e=>uV(vi,"pj",e.target.value)} style={{minWidth:110}}><option value="">—</option>{pj.map(p=><option key={p.nm} value={p.nm}>{p.nm}</option>)}</select></td>
<td><select value={v.ty} onChange={e=>uV(vi,"ty",e.target.value)}><option>VO</option><option>DL</option></select></td>
<td><input value={v.vn} onChange={e=>uV(vi,"vn",e.target.value)} className="sm"/></td>
<td><input value={v.vnm} onChange={e=>uV(vi,"vnm",e.target.value.substring(0,100))} className="md"/></td>
<td><input value={v.ds} onChange={e=>uV(vi,"ds",e.target.value)} className="sm"/></td>
<td><input value={v.da} onChange={e=>uV(vi,"da",e.target.value)} className="sm"/></td>
<td style={{textAlign:"right"}}><input type="number" step=".01" value={v.pr||""} onChange={e=>uV(vi,"pr",N(e.target.value))} className="nm"/></td>
<td><input value={v.st} onChange={e=>uV(vi,"st",e.target.value)} className={sC(v.st)} style={{minWidth:90}}/></td>
<td style={{textAlign:"right"}}><input type="number" step=".01" value={v.em||""} onChange={e=>uV(vi,"em",N(e.target.value))} className="nm"/></td>
<td style={{textAlign:"right"}}><input type="number" step=".01" value={v.pf||""} onChange={e=>uV(vi,"pf",N(e.target.value))} className="nm"/></td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:mg<0?"var(--rd)":"var(--gn)"}}>{mg?fm(mg):""}</td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:"var(--pu)"}}>{v.nmn||""}</td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:"var(--pu)"}}>{v.nh||""}</td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:"var(--pu)"}}>{v.nr||""}</td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:"var(--pu)"}}>{v.oh||""}</td>
<td style={{textAlign:"right",fontFamily:"var(--mn)",color:"var(--pu)"}}>{v.or2||""}</td>
</tr>})}</tbody></table></div>}
</div>}
</>}
</div>
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
