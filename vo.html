const m2={"pj":"PROJECT","ty":"TYPE","vn":"VARIATION NO.","srn":"SUB REF NO.","vnm":"VARIATION NAME","ds":"DATE SUBMITTED","da":"DATE APPROVED","pr":"PRICE","st":"STATUS","em":"EXTERNAL MATERIALS","pf":"PFAB MATERIALS","nmn":"NO. OF MEN","nh":"NORMAL HOURS","nr":"NORMAL RATE","oh":"OVERTIME HOURS","or2":"OVERTIME RATE","notes":"NOTES"};
sSv(true);await enq(()=>aP({action:"updateCoordVO",user,row:v._r,field:m2[fd]||fd,value:val,editedBy:identity,editedAt:new Date().toLocaleString("en-AU")}));if(autoP)await enq(()=>aP({action:"updateCoordVO",user,row:v._r,field:"PRICE",value:newPr,editedBy:identity,editedAt:new Date().toLocaleString("en-AU")}));sSv(false)},[vo,user,identity]);

const dVO=async(v)=>{const stL=String(v.st||"").toLowerCase();if(stL.indexOf("fully claimed")!==-1||stL.indexOf("partially claimed")!==-1){alert("⛔ Cannot delete this VO.\n\nThis VO has been marked as \""+v.st+"\" in the Master VO Register.\n\nClaimed VOs are locked to protect the audit trail. If this needs to be removed, contact an admin.");return}const wasFromMaster=v.pushed==="from master";const wasPushed=v.pushed&&!wasFromMaster;let alsoFromMaster=false;if(wasPushed){if(!confirm("⚠️ This VO was pushed to Master on "+v.pushed+".\n\nDeleting will REMOVE IT FROM BOTH:\n  • Your register here\n  • The Master Pipeline VO Register\n\nContinue?"))return;alsoFromMaster=true}else if(wasFromMaster){if(!confirm("⚠️ This VO came from the Master Pipeline.\n\nDeleting will REMOVE IT FROM BOTH:\n  • Your register here\n  • The Master Pipeline VO Register\n\nContinue?"))return;alsoFromMaster=true}else{if(!confirm("Delete VO: "+(v.vnm||v.pj||"entry")+"?"))return}sSv(true);sVo(prev=>prev.filter(x=>x._r!==v._r));await enq(()=>aP({action:"deleteCoordVO",user,row:v._r,alsoFromMaster:alsoFromMaster}));sSv(false)};

const pushVO=async(v)=>{
if(!confirm(v.pushed?"Re-push \""+v.vnm+"\" to update Master?":"Push \""+v.vnm+"\" to Master VO Register?"))return;
sSv(true);
sVo(prev=>prev.map(x=>x._r===v._r?{...x,pushed:new Date().toLocaleString("en-AU")}:x));
await enq(()=>aP({action:"pushToMaster",user,row:v._r}));
sSv(false)};

const addV=async()=>{if(!nvo.project)return;sSv(true);sSa(false);const newVo={...nvo};sNvo({project:"",type:"VO",varNo:"",varName:"",ds:"",da:"",price:0,status:"",em:0,pf:0});const fullVarNo=(newVo.type==="DL"?"DL-":"VO-")+newVo.varNo;const tempRow={i:Date.now(),_r:Date.now(),pj:newVo.project,ty:newVo.type,vn:fullVarNo,srn:"",vnm:newVo.varName,ds:newVo.ds,da:newVo.da,pr:Number(newVo.price)||0,st:newVo.status,em:Number(newVo.em)||0,pf:Number(newVo.pf)||0,nmn:0,nh:0,nr:0,oh:0,or2:0,notes:"",pushed:"",eb:identity,ea:new Date().toLocaleString("en-AU"),_pending:true};sVo(prev=>[tempRow,...prev]);enq(()=>aP({action:"addCoordVO",user,project:newVo.project,type:newVo.type,varNo:fullVarNo,varName:newVo.varName,dateSubmitted:newVo.ds,dateApproved:newVo.da,price:newVo.price,status:newVo.status,extMaterials:newVo.em,pfabMaterials:newVo.pf,margin:newVo.price-newVo.em-newVo.pf,notes:""})).then(()=>{load(true).then(()=>sSv(false))});};

const voFilt=useMemo(()=>{let f=vo;if(filtPj_d)f=f.filter(v=>v.pj.toLowerCase().includes(filtPj_d.toLowerCase()));if(filtTy_d!=="all")f=f.filter(v=>v.ty===filtTy_d);if(filtSt_d.length>0)f=f.filter(v=>filtSt_d.some(s=>v.st.toLowerCase().includes(s.toLowerCase())));return f.slice().sort((a,b)=>{const ad=dsToTs(a.ds),bd=dsToTs(b.ds);if(!ad&&bd)return 1;if(ad&&!bd)return -1;return bd-ad})},[vo,filtPj_d,filtTy_d,filtSt_d]);

const apCount=vo.filter(v=>{const u=String(v.st).toLowerCase();return u.includes("fully claimed")||u.includes("partially claimed")||u.includes("accepted")}).length;

if(!pp)return<div className="np"><div style={{textAlign:"center"}}><div style={{fontSize:40}}>🔒</div><h2 style={{marginBottom:12}}>Coordinator Access</h2>
<p style={{color:"var(--t2)",fontSize:11,marginBottom:12}}>Enter the team passphrase to continue.</p>
<input type="password" value={ppI} onChange={e=>setPpI(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&ppI.trim())submitPp()}} placeholder="Passphrase..." autoFocus style={{padding:"10px 14px",fontSize:14,border:"1px solid var(--bd)",borderRadius:6,fontFamily:"var(--ft)",marginBottom:8,width:200}}/>
<br/><button disabled={!ppI.trim()} onClick={submitPp} style={{padding:"8px 30px",fontSize:13,fontWeight:700,fontFamily:"var(--ft)",background:ppI.trim()?"var(--ac)":"var(--bd)",color:"#fff",border:"none",borderRadius:6,cursor:ppI.trim()?"pointer":"default"}}>Unlock →</button>
<div style={{marginTop:12,fontSize:10,color:"var(--t2)"}}>Ask your team admin if you don't have it.</div>
</div></div>;

if(idCheck)return<div className="np"><div style={{textAlign:"center",color:"var(--t2)",fontSize:12}}>Verifying access...</div></div>;
if(!identity)return<div className="np"><div style={{textAlign:"center"}}><h2 style={{marginBottom:12}}>Who are you?</h2>
<p style={{color:"var(--t2)",fontSize:11,marginBottom:12}}>This is saved so we know who made changes.</p>
{USERS.map(u=><button key={u} onClick={()=>{setIdentity(u);localStorage.setItem("vo-identity",u);if(!user)setUser(u)}} style={{display:"block",margin:"6px auto",padding:"10px 40px",fontSize:14,fontWeight:700,fontFamily:"var(--ft)",background:"var(--ac)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>{u}</button>)}
</div></div>;

if(!user)return<div className="np"><div style={{textAlign:"center"}}><h2 style={{marginBottom:12}}>Select Register</h2>
<p style={{color:"var(--t2)",fontSize:11,marginBottom:12}}>Logged in as <b>{identity}</b></p>
{USERS.map(u=><button key={u} onClick={()=>{setUser(u);window.history.replaceState(null,"","?user="+u)}} style={{display:"block",margin:"6px auto",padding:"10px 40px",fontSize:14,fontWeight:700,fontFamily:"var(--ft)",background:"var(--ac)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>{u}</button>)}
</div></div>;

return<div className="app">
<div className="hd"><div className="hl"><h1>Variation Register — {user}</h1>{user!==identity&&<span style={{fontSize:9,color:"var(--am)",fontWeight:700,marginLeft:4}}>(edited by {identity})</span>}<span className="dot" style={{background:saveErr?"#d9534f":sv?"var(--am)":"var(--gn)"}}/><span className="dx" style={{color:saveErr?"#d9534f":sv?"var(--am)":"var(--gn)",cursor:saveErr?"pointer":"default",fontWeight:saveErr?700:400}} onClick={saveErr?()=>{setSaveErr(null);load()}:undefined} title={saveErr||""}>{saveErr?"⚠ Save failed - click to retry":sv?"Saving...":"Connected"}</span></div>
<div style={{display:"flex",gap:4}}><button className="act-btn" onClick={()=>setActOpen(true)} title="Recent edits across the team">📋 Activity</button><button className="rb" onClick={load}>↻ Sync</button><button className="rb" onClick={()=>setUser("")}>Switch Register</button><span style={{fontSize:9,color:"var(--t2)"}}>👤 {identity}</span></div></div>
{/* ACTIVITY PANEL */}
<div className={"act-overlay"+(actOpen?" open":"")} onClick={()=>setActOpen(false)}/>
<div className={"act-panel"+(actOpen?" open":"")}>
<div className="act-hdr"><h3>Recent Activity</h3><button onClick={()=>setActOpen(false)} title="Close">✕</button></div>
<div className="act-section">
{(actData.activity||[]).length===0?<div className="act-empty">No recent activity.</div>:cleanActivity(actData.activity||[]).map((a,i)=><div key={i} className="act-item"><div className="act-item-user">{a.user}</div><div className="act-item-target">{a.sheet}{a.target?" · "+a.target:""}</div><div className="act-item-when">{tAgo(a.when)}</div></div>)}
</div>
</div>

{er&&<div className="er">{er}</div>}
{ld?<div className="ld">Loading...</div>:<>

{/* Toolbar */}
<div className="vo-cards">
<div className="vo-card"><div className="lb">Total VOs</div><div className="vl" style={{color:"var(--ac)"}}>{voFilt.length}</div></div>
<div className="vo-card"><div className="lb">Total Price</div><div className="vl" style={{color:"var(--ac)"}}>${voFilt.reduce((t,v)=>t+v.pr,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">Ext. Materials</div><div className="vl" style={{color:"var(--rd)"}}>${voFilt.reduce((t,v)=>t+v.em,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">PFAB Materials</div><div className="vl" style={{color:"var(--rd)"}}>${voFilt.reduce((t,v)=>t+v.pf,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">Margin</div><div className="vl" style={{color:"var(--gn)"}}>${voFilt.reduce((t,v)=>t+(v.pr-v.em-v.pf),0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
</div>
<div className="br">
<button className="pl gn" onClick={()=>sSa(!sa)}>{sa?"Cancel":"+ Add"}</button>
<div style={{display:"flex",gap:2}}>{["all","VO","DL"].map(t=><button key={t} onClick={()=>setFiltTy(t)} style={{padding:"2px 10px",borderRadius:10,border:"1px solid",borderColor:filtTy===t?"var(--ac)":"var(--bd)",background:filtTy===t?"var(--ac)":"transparent",color:filtTy===t?"#fff":"var(--t2)",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"var(--ft)"}}>{t==="all"?"All":t}</button>)}</div>
<div style={{display:"flex",gap:2}}>{VO_ST.map(s=>{const cnt=vo.filter(v=>{const pjM=!filtPj||v.pj.toLowerCase().includes(filtPj.toLowerCase());const tyM=filtTy==="all"||v.ty===filtTy;return pjM&&tyM&&v.st.toLowerCase().includes(s.v.toLowerCase().split(" - ")[0].split(" ")[0])}).length;return<button key={s.v} onClick={()=>setFiltSt(p=>p.includes(s.v)?p.filter(x=>x!==s.v):[...p,s.v])} style={{padding:"2px 6px",borderRadius:10,border:"1px solid",borderColor:filtSt.includes(s.v)?s.c:"var(--bd)",background:filtSt.includes(s.v)?s.c:"transparent",color:filtSt.includes(s.v)?"#fff":s.c,fontSize:8,fontWeight:600,cursor:"pointer",fontFamily:"var(--ft)"}}>{s.v.split(" - ")[0].split(" ").slice(0,2).join(" ")} ({cnt})</button>})}</div>
<input className="sx" placeholder="Search project..." value={filtPj} onChange={e=>setFiltPj(e.target.value)}/>
<span style={{fontSize:9,color:"var(--t2)",marginLeft:"auto"}}>{voFilt.length} of {vo.length} · Approved: {apCount}</span>{selRows.size>0&&<button className="pl gn" onClick={async()=>{if(!confirm("Push "+selRows.size+" selected VOs to Master?"))return;sSv(true);for(const r of selRows){const v=vo.find(x=>x._r===r);if(v){sVo(prev=>prev.map(x=>x._r===r?{...x,pushed:new Date().toLocaleString("en-AU")}:x));await enq(()=>aP({action:"pushToMaster",user,row:v._r}))}}setSelRows(new Set());sSv(false)}}>{selRows.size} Push Selected</button>}
</div>

{/* Add form */}
{sa&&<div style={{padding:8,background:"var(--s2)",borderRadius:4,marginBottom:6,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
<select value={nvo.project} onChange={e=>sNvo({...nvo,project:e.target.value})} style={{padding:"3px 6px",fontSize:10}}><option value="">Project...</option>{pj.map(p=><option key={p.nm} value={p.nm}>{p.nm}</option>)}</select>
<select value={nvo.type} onChange={e=>sNvo({...nvo,type:e.target.value})} style={{padding:"3px 6px",fontSize:10}}><option>VO</option><option>DL</option></select>
<input placeholder="Var No." value={nvo.varNo} onChange={e=>sNvo({...nvo,varNo:e.target.value})} style={{width:60,padding:"3px 6px",fontSize:10}}/>
<input placeholder="Name" value={nvo.varName} onChange={e=>sNvo({...nvo,varName:e.target.value})} style={{width:140,padding:"3px 6px",fontSize:10}}/>
<button className="pl gn" onClick={addV}>Add</button>
</div>}

{/* Table */}
<div className="vw"><datalist id="vo-projects-list">{pj.map(p=><option key={p.nm} value={p.nm}/>)}</datalist><div className="vsc"><table className="vt" style={{width:colW.reduce((a,b)=>a+b,0)+"px",minWidth:colW.reduce((a,b)=>a+b,0)+"px"}}><colgroup>{colW.map((w,i)=><col key={i} style={{width:w+"px"}}/>)}</colgroup><thead><tr>
{["","☐","Project","Type","Var No.","Sub Ref No.","Name","Date Sub.","Date Appr.","Price","Status","Ext.Mat","PFAB","Margin","#Men","NHrs","NRate","OTHrs","OTRate","Notes","Push"].map((h,ci)=><th key={h+ci} className={ci<2?"":ci<11?"tg":ci<14?"ty":ci<19?"tp":"tg"} style={{width:colW[ci],minWidth:30,...(ci<7?{position:"sticky",left:colW.slice(0,ci).reduce((a,b)=>a+b,0),zIndex:5}:{}),borderRight:ci===6?"2px solid var(--bd)":undefined}}>{h==="☐"?<input type="checkbox" checked={voFilt.length>0&&voFilt.every(v2=>selRows.has(v2._r))} onChange={e=>{if(e.target.checked){const n=new Set(selRows);voFilt.forEach(v2=>n.add(v2._r));setSelRows(n)}else{setSelRows(new Set())}}} style={{cursor:"pointer"}}/>:h}{ci>0&&<div className="col-resize" onMouseDown={e=>startResize(ci,e)}/>}</th>)}
</tr></thead><tbody>
{voFilt.length===0?<tr><td colSpan={20} style={{textAlign:"center",padding:20,color:"var(--t2)"}}>No entries.</td></tr>:
voFilt.map((v,vi)=>{const mg=v.pr-v.em-v.pf;const rc=voRowColor(v.st);return<tr key={v.i} style={{color:rc}} title={editTip(v.eb,v.ea)}>
<td style={{textAlign:"center",padding:0,width:24,position:"sticky",left:0,zIndex:2}}><button onClick={()=>dVO(v)} style={{background:"none",border:"none",color:"var(--rd)",cursor:"pointer",fontSize:14,fontWeight:700,opacity:.4}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.4} title="Delete">×</button></td>
<td style={{textAlign:"center",padding:0,position:"sticky",left:colW[0],zIndex:2}}><input type="checkbox" checked={selRows.has(v._r)} onChange={e=>{const n=new Set(selRows);if(e.target.checked)n.add(v._r);else n.delete(v._r);setSelRows(n)}} style={{cursor:"pointer"}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1],zIndex:2}}><DebInput list="vo-projects-list" value={v.pj} onSave={val=>uV(v.i,"pj",val)} style={{color:rc,width:"100%"}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2],zIndex:2}}><select value={v.ty} onChange={e=>uV(v.i,"ty",e.target.value)} style={{background:"transparent",border:"none",color:rc,fontSize:10,width:"100%"}}><option>VO</option><option>DL</option></select></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2]+colW[3],zIndex:2}}><DebInput value={v.vn} onSave={val=>uV(v.i,"vn",val)} style={{color:rc}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2]+colW[3]+colW[4],zIndex:2}}><DebInput value={v.srn||""} onSave={val=>uV(v.i,"srn",val)} style={{color:rc}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2]+colW[3]+colW[4]+colW[5],zIndex:2,borderRight:"2px solid var(--bd)"}}><DebInput value={v.vnm} onSave={val=>uV(v.i,"vnm",val)} maxLen={100} style={{color:rc}}/></td>
<td><DebInput value={v.ds} onSave={val=>uV(v.i,"ds",val)} format={fmD} placeholder="dd-mm-yy" style={{color:rc}}/></td>
<td><DebInput value={v.da} onSave={val=>uV(v.i,"da",val)} format={fmD} placeholder="dd-mm-yy" style={{color:rc}}/></td>
<td style={{textAlign:"right"}}><EC value={v.pr} onChange={val=>uV(v.i,"pr",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td><select value={v.st} onChange={e=>uV(v.i,"st",e.target.value)} style={{background:"transparent",border:"none",color:rc,fontSize:10,fontWeight:600,width:"100%"}}><option value="">—</option>{VO_ST.map(s=><option key={s.v} value={s.v}>{s.v}</option>)}</select></td>
<td style={{textAlign:"right"}}><EC value={v.em} onChange={val=>uV(v.i,"em",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right"}}><EC value={v.pf} onChange={val=>uV(v.i,"pf",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right",color:rc,fontFamily:"var(--mn)"}}>{mg?fmP(mg):""}</td>
<td style={{textAlign:"right"}}><EC value={v.nmn} onChange={val=>uV(v.i,"nmn",val)} cls="cl" style={{color:rc}} fmt={fmN}/></td>
<td style={{textAlign:"right"}}><EC value={v.nh} onChange={val=>uV(v.i,"nh",val)} cls="cl" style={{color:rc}} fmt={fm2}/></td>
<td style={{textAlign:"right"}}><EC value={v.nr} onChange={val=>uV(v.i,"nr",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right"}}><EC value={v.oh} onChange={val=>uV(v.i,"oh",val)} cls="cl" style={{color:rc}} fmt={fm2}/></td>
<td style={{textAlign:"right"}}><EC value={v.or2} onChange={val=>uV(v.i,"or2",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"center"}} onClick={()=>{setNoteEdit(v.i);setNoteText(v.notes||"")}}>{v.notes?<span title={v.notes} style={{cursor:"pointer",fontSize:14}}>💬</span>:<span style={{cursor:"pointer",color:"var(--t2)",fontSize:12}}>+</span>}</td>
<td style={{textAlign:"center"}}>{v.pushed==="from master"?<span style={{fontSize:8,color:"var(--t2)",fontStyle:"italic"}}>Master</span>:v.pushed?<button className="push-btn" onClick={()=>pushVO(v)} title={"Last pushed: "+v.pushed} style={{background:"var(--ac)"}}>Update</button>:<button className="push-btn" onClick={()=>pushVO(v)}>Push</button>}</td>
</tr>})}
</tbody></table></div></div>

{/* Notes modal */}
{noteEdit!==null&&<div className="notes-modal" onClick={()=>setNoteEdit(null)}>
<div className="notes-box" onClick={e=>e.stopPropagation()}>
<h4>Notes — {vo[noteEdit]?.vnm||vo[noteEdit]?.pj||"Entry"}</h4>
<textarea value={noteText} onChange={e=>setNoteText(e.target.value)} autoFocus placeholder="Type notes here..."/>
<div className="nbtn">
<button className="pl" onClick={()=>setNoteEdit(null)}>Cancel</button>
<button className="pl gn" onClick={()=>{uV(noteEdit,"notes",noteText);setNoteEdit(null)}}>Save</button>
</div></div></div>}
</>}
</div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
