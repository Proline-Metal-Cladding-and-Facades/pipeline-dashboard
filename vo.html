<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Variation Register</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6f9;--s1:#ffffff;--s2:#edf0f5;--s3:#e2e6ed;--bd:#cdd3de;--tx:#1e2330;--t2:#6b7489;--ac:#4472c4;--a2:#3560b5;--rd:#dc4a4a;--gn:#1a9a6b;--am:#a07008;--pu:#7c3aed;--ft:'Outfit',sans-serif;--mn:'Aptos','Calibri','Segoe UI',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
#root{height:100%}
body{font-family:var(--ft);background:var(--bg);color:var(--tx);font-size:11px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
.app{padding:8px 12px 0 12px;height:100%;display:flex;flex-direction:column;min-height:0}
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0}
.hl{display:flex;align-items:center;gap:8px}
.hl h1{font-size:16px;font-weight:800}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dx{font-size:9px;font-weight:600}
.rb{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:9px;font-weight:600;font-family:var(--ft)}
.rb:hover{color:var(--tx);border-color:var(--ac)}
.er{background:rgba(220,74,74,.1);color:var(--rd);padding:6px 10px;border-radius:4px;font-size:10px;margin-bottom:8px}
.ld{text-align:center;padding:40px;color:var(--t2);font-size:14px}
.em{text-align:center;padding:30px;color:var(--t2);font-size:11px}
/* Toolbar */
.br{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap}
.pl{padding:4px 12px;border-radius:4px;font-weight:700;font-size:10px;cursor:pointer;font-family:var(--ft);border:1px solid var(--bd);background:var(--s2);color:var(--tx)}
.pl.gn{background:var(--gn);color:#fff;border-color:var(--gn)}
.pl.rd{background:var(--rd);color:#fff;border-color:var(--rd)}
.sx{background:var(--bg);border:1px solid var(--bd);color:var(--tx);padding:4px 10px;border-radius:4px;font-family:var(--ft);font-size:10px;outline:none;width:180px}
/* VO Table */
.vw{background:#fff;overflow:hidden;border:none;margin:0;padding:0;flex:1;min-height:0;display:flex;flex-direction:column}
.vhd{padding:4px 10px;background:var(--s2);border-bottom:2px solid var(--bd);display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-shrink:0}
.vsc{overflow:auto;flex:1;min-height:0}
.vt{width:100%;border-collapse:separate;border-spacing:0;font-size:10px;font-family:var(--mn);table-layout:fixed}
.vt th{text-align:center;padding:6px 8px;font-size:9px;color:var(--tx);font-weight:700;border:1px solid var(--bd);background:var(--s2);position:sticky;top:0;z-index:1;white-space:nowrap;position:relative}
.vt th.tg{background:#e8f5e9;color:#2e7d32}.vt th.ty{background:#fff8e1;color:#f57f17}.vt th.tp{background:#f3e5f5;color:#7b1fa2}
.vt td{padding:4px 8px;border:1px solid var(--bd);background:#fff}
.vt tr:nth-child(even) td{background:#f8f9fb}
.vt tr:hover td{background:rgba(68,114,196,.08)}
.vt input,.vt select{background:transparent;border:none;color:var(--tx);padding:2px 0;font-family:var(--mn);font-size:10px;outline:none;width:100%;box-sizing:border-box}
.vt input:focus,.vt select:focus{background:rgba(68,114,196,.06);border-bottom:1px solid var(--ac)}





.vt .col-resize{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;background:transparent}
.vt .col-resize:hover{background:var(--ac)}
/* Push button */
.push-btn{background:var(--gn);color:#fff;border:none;padding:2px 8px;border-radius:3px;font-size:8px;font-weight:700;cursor:pointer;font-family:var(--ft)}
.push-btn:hover{background:#158a5e}
.push-btn.done{background:var(--s3);color:var(--t2);cursor:default}
/* Notes modal */
.notes-modal{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:60}
.notes-box{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:16px;width:360px;max-width:90%}
.notes-box h4{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--tx)}
.notes-box textarea{width:100%;height:120px;border:1px solid var(--bd);border-radius:4px;padding:8px;font-family:var(--ft);font-size:11px;outline:none;resize:vertical;color:var(--tx)}
.notes-box textarea:focus{border-color:var(--ac)}
.notes-box .nbtn{display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
/* Status colors */
.np{position:fixed;inset:0;background:#f4f6f9;display:flex;align-items:center;justify-content:center;z-index:99}
.nin{font-size:14px;padding:8px 12px;border:2px solid var(--ac);border-radius:6px;outline:none;width:200px;font-family:var(--ft);color:var(--tx)}

/* VO freeze panes */

.vt th:nth-child(-n+6){z-index:5;background:var(--s2)}
.vt td:nth-child(-n+6){background:#fff}
.vt tr:nth-child(even) td:nth-child(-n+6){background:#f8f9fb}
.vt tr:hover td:nth-child(-n+6){background:rgba(68,114,196,.08)!important}
.vt th{position:sticky;top:0;z-index:3}

.vo-cards{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;flex-shrink:0}
.vo-card{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:6px 12px;flex:1;min-width:100px}
.vo-card .lb{font-size:8px;color:var(--t2);text-transform:uppercase;font-weight:700;letter-spacing:.3px}
.vo-card .vl{font-size:16px;font-weight:800;margin-top:2px}
.br{flex-shrink:0}
</style></head><body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useMemo,useCallback}=React;
const API="https://script.google.com/macros/s/AKfycbxZSeOefNZ7nPHiq_Y7ZJNUnIGgfXe8p89KNGLQWhyNdS1SDFy0ZZu5_MdWyc1jrrpFDw/exec";

const USERS=["Lachlan","Lizzie","Luka"];

function fmP(v){if(!v&&v!==0)return"";return"$"+Number(v).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmN(v){if(!v&&v!==0)return"";return Math.round(Number(v)).toLocaleString("en-AU",{maximumFractionDigits:0})}
function fm2(v){if(!v&&v!==0)return"";return Number(v).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmD(v){if(!v)return"";var s=String(v).trim();var ms=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
if(s.includes("T")||/^\d{4}-\d{2}-\d{2}/.test(s)){var d=new Date(s);if(!isNaN(d)){return String(d.getDate()).padStart(2,"0")+"-"+ms[d.getMonth()]+"-"+String(d.getFullYear()).slice(2)}}
var m=s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{2,4})$/);if(m){var mi=parseInt(m[2])-1;if(mi>=0&&mi<12)return m[1].padStart(2,"0")+"-"+ms[mi]+"-"+(m[3].length===4?m[3].slice(2):m[3])}
var m2=s.match(/^(\d{1,2})[-\/]([A-Za-z]{3})[-\/](\d{2,4})$/);if(m2)return m2[1].padStart(2,"0")+"-"+m2[2].charAt(0).toUpperCase()+m2[2].slice(1,3).toLowerCase()+"-"+(m2[3].length===4?m2[3].slice(2):m2[3]);
return s}
function N(v){return parseFloat(v)||0}
function F(o,...ks){for(const k of ks){if(o[k]!==undefined&&o[k]!==null&&o[k]!=="")return o[k];const lk=k.toLowerCase();for(const ok of Object.keys(o)){if(ok.toLowerCase().replace(/[\s_.\-]+/g,"")===lk.replace(/[\s_.\-]+/g,""))return o[ok]}}return""}

const VO_ST=[{v:"Priced - Not Yet Approved",c:"var(--tx)"},{v:"Fully Claimed",c:"#1a9a6b"},{v:"Partially Claimed",c:"#c45e10"},{v:"Accepted - Not Yet Claimed",c:"#7c3aed"},{v:"Rejected",c:"#b5b5b5"}];
const voRowColor=st=>{const s=String(st||"").toLowerCase();if(s.includes("fully claimed"))return"#1a9a6b";if(s.includes("partially"))return"#c45e10";if(s.includes("accepted"))return"#7c3aed";if(s.includes("rejected"))return"#b5b5b5";return"var(--tx)"};

function EC({value,onChange,cls,style,fmt}){const[e,sE]=useState(false);const[d,sD]=useState("");const r=useRef();
if(e)return<input ref={r} autoFocus type="text" value={d} onChange={ev=>{sD(ev.target.value)}} onBlur={()=>{const v=parseFloat(d.replace(/[$,]/g,""))||0;onChange(v);sE(false)}} onKeyDown={ev=>{if(ev.key==="Enter"){const v=parseFloat(d.replace(/[$,]/g,""))||0;onChange(v);sE(false)}if(ev.key==="Escape")sE(false)}} style={{width:"100%",textAlign:"right",...(style||{})}}/>;
return<div className={cls||"cl"} style={{textAlign:"right",fontFamily:"var(--mn)",cursor:"pointer",padding:"2px 4px",...(style||{})}} onDoubleClick={()=>{sD(value?String(value):"");sE(true)}}>{value?(fmt?fmt(value):String(value)):""}</div>}

function App(){
const urlUser=new URLSearchParams(window.location.search).get("user")||"";
const[identity,setIdentity]=useState(()=>localStorage.getItem("vo-identity")||"");
const[user,setUser]=useState(urlUser);
const[vo,sVo]=useState([]);
const[pj,sPj]=useState([]);
const[ld,sLd]=useState(true);
const[sv,sSv]=useState(false);
const[er,sEr]=useState(null);
const[sa,sSa]=useState(false);
const[nvo,sNvo]=useState({project:"",type:"VO",varNo:"",varName:"",ds:"",da:"",price:0,status:"",em:0,pf:0});

const[filtPj,setFiltPj]=useState("");
const[selRows,setSelRows]=useState(new Set());
const[filtTy,setFiltTy]=useState("all");
const[filtSt,setFiltSt]=useState([]);
const[noteEdit,setNoteEdit]=useState(null);
const[noteText,setNoteText]=useState("");

const defCW=[24,28,130,60,70,140,90,90,85,170,80,80,80,60,60,60,60,60,50,70];
const[colW,setColW]=useState(defCW);
const startResize=(ci,e)=>{e.preventDefault();const startX=e.clientX;const startW=colW[ci];const onMove=e2=>{const diff=e2.clientX-startX;setColW(prev=>{const n=[...prev];n[ci]=Math.max(30,startW+diff);return n})};const onUp=()=>{document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp)};document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp)};

async function aP(p){try{await fetch(API,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(p)});return true}catch{return false}}

const load=useCallback(async()=>{sLd(true);sEr(null);try{const r=await fetch(API+"?action=getCoordVO&user="+encodeURIComponent(user));const d=await r.json();if(d.error){sEr(d.error);sLd(false);return}
const vD=d.vos||[];const pD=d.projects||[];
sPj(pD.map(p=>({nm:String(F(p,"Project","PROJECT")).trim()})).filter(p=>!p.nm.startsWith("_")));
sVo(vD.map((v,i)=>({i,_r:v._row!==undefined?v._row:i,
pj:String(F(v,"PROJECT","Project")).trim(),
ty:String(F(v,"TYPE","Type")),
vn:String(F(v,"VARIATION NO.")),
vnm:String(F(v,"VARIATION NAME")),
ds:fmD(String(F(v,"DATE SUBMITTED"))),
da:fmD(String(F(v,"DATE APPROVED"))),
pr:N(F(v,"PRICE","REVENUE")),
st:String(F(v,"STATUS","Status")),
em:N(F(v,"EXTERNAL MATERIALS")),
pf:N(F(v,"PFAB MATERIALS")),
nmn:N(F(v,"NO. OF MEN")),
nh:N(F(v,"NORMAL HOURS")),
nr:N(F(v,"NORMAL RATE")),
oh:N(F(v,"OVERTIME HOURS")),
or2:N(F(v,"OVERTIME RATE")),
notes:String(F(v,"NOTES","Notes")||""),
pushed:String(F(v,"PUSHED","")||"")
})));
sLd(false)}catch(e){sEr("Failed to connect: "+e.message);sLd(false)}},[user]);

useEffect(()=>{if(user)load()},[user,load]);

const calcPrice=(v,fd,val)=>{const u={...v,[fd]:val};const p=(N(u.nmn)*N(u.nh)*N(u.nr))+(N(u.nmn)*N(u.oh)*N(u.or2));return p};
const uV=useCallback(async(vi,fd,val)=>{const v=vo[vi];if(!v)return;const autoP=["nmn","nh","nr","oh","or2"].includes(fd);const newPr=autoP?calcPrice(v,fd,val):null;sVo(pr=>pr.map((x,i)=>i===vi?{...x,[fd]:val,...(autoP?{pr:newPr}:{})}:x));
const m2={"pj":"PROJECT","ty":"TYPE","vn":"VARIATION NO.","vnm":"VARIATION NAME","ds":"DATE SUBMITTED","da":"DATE APPROVED","pr":"PRICE","st":"STATUS","em":"EXTERNAL MATERIALS","pf":"PFAB MATERIALS","nmn":"NO. OF MEN","nh":"NORMAL HOURS","nr":"NORMAL RATE","oh":"OVERTIME HOURS","or2":"OVERTIME RATE","notes":"NOTES"};
sSv(true);await aP({action:"updateCoordVO",user,row:v._r,field:m2[fd]||fd,value:val,editedBy:identity,editedAt:new Date().toLocaleString("en-AU",{maximumFractionDigits:0})});sSv(false)},[vo,user]);

const dVO=async(v)=>{if(v.pushed){if(!confirm("⚠️ This VO was pushed to Master on "+v.pushed+".\n\nDeleting here will NOT remove it from the Master Pipeline.\nContact admin to remove it from Master.\n\nDelete from your register anyway?"))return}else{if(!confirm("Delete VO: "+(v.vnm||v.pj||"entry")+"?"))return}sSv(true);await aP({action:"deleteCoordVO",user,row:v._r});sVo(prev=>prev.filter(x=>x._r!==v._r));sSv(false);load()};

const pushVO=async(v)=>{
if(!confirm(v.pushed?"Re-push \""+v.vnm+"\" to update Master?":"Push \""+v.vnm+"\" to Master VO Register?"))return;
sSv(true);await aP({action:"pushToMaster",user,row:v._r});
sVo(prev=>prev.map(x=>x._r===v._r?{...x,pushed:new Date().toLocaleString("en-AU",{maximumFractionDigits:0})}:x));
sSv(false);load()};

const addV=async()=>{if(!nvo.project)return;sSv(true);await aP({action:"addCoordVO",user,project:nvo.project,type:nvo.type,varNo:(nvo.type==="DL"?"DL-":"VO-")+nvo.varNo,varName:nvo.varName,dateSubmitted:nvo.ds,dateApproved:nvo.da,price:nvo.price,status:nvo.status,extMaterials:nvo.em,pfabMaterials:nvo.pf,margin:nvo.price-nvo.em-nvo.pf,notes:""});sSa(false);sNvo({project:"",type:"VO",varNo:"",varName:"",ds:"",da:"",price:0,status:"",em:0,pf:0});sSv(false);setTimeout(load,1500)};

const voFilt=useMemo(()=>{let f=vo;if(filtPj)f=f.filter(v=>v.pj.toLowerCase().includes(filtPj.toLowerCase()));if(filtTy!=="all")f=f.filter(v=>v.ty===filtTy);if(filtSt.length>0)f=f.filter(v=>filtSt.some(s=>v.st.toLowerCase().includes(s.toLowerCase())));return f},[vo,filtPj,filtTy,filtSt]);

const apCount=vo.filter(v=>{const u=String(v.st).toLowerCase();return u.includes("fully claimed")||u.includes("partially claimed")||u.includes("accepted")}).length;

if(!identity)return<div className="np"><div style={{textAlign:"center"}}><h2 style={{marginBottom:12}}>Who are you?</h2>
<p style={{color:"var(--t2)",fontSize:11,marginBottom:12}}>This is saved so we know who made changes.</p>
{USERS.map(u=><button key={u} onClick={()=>{setIdentity(u);localStorage.setItem("vo-identity",u);if(!user)setUser(u)}} style={{display:"block",margin:"6px auto",padding:"10px 40px",fontSize:14,fontWeight:700,fontFamily:"var(--ft)",background:"var(--ac)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>{u}</button>)}
</div></div>;

if(!user)return<div className="np"><div style={{textAlign:"center"}}><h2 style={{marginBottom:12}}>Select Register</h2>
<p style={{color:"var(--t2)",fontSize:11,marginBottom:12}}>Logged in as <b>{identity}</b></p>
{USERS.map(u=><button key={u} onClick={()=>{setUser(u);window.history.replaceState(null,"","?user="+u)}} style={{display:"block",margin:"6px auto",padding:"10px 40px",fontSize:14,fontWeight:700,fontFamily:"var(--ft)",background:"var(--ac)",color:"#fff",border:"none",borderRadius:6,cursor:"pointer"}}>{u}</button>)}
</div></div>;

return<div className="app">
<div className="hd"><div className="hl"><h1>Variation Register — {user}</h1>{user!==identity&&<span style={{fontSize:9,color:"var(--am)",fontWeight:700,marginLeft:4}}>(edited by {identity})</span>}<span className="dot" style={{background:sv?"var(--am)":"var(--gn)"}}/><span className="dx" style={{color:sv?"var(--am)":"var(--gn)"}}>{sv?"Saving...":"Connected"}</span></div>
<div style={{display:"flex",gap:4}}><button className="rb" onClick={load}>↻ Sync</button><button className="rb" onClick={()=>setUser("")}>Switch Register</button><span style={{fontSize:9,color:"var(--t2)"}}>👤 {identity}</span></div></div>

{er&&<div className="er">{er}</div>}
{ld?<div className="ld">Loading...</div>:<>

{/* Toolbar */}
<div className="vo-cards">
<div className="vo-card"><div className="lb">Total VOs</div><div className="vl" style={{color:"var(--ac)"}}>{voFilt.length}</div></div>
<div className="vo-card"><div className="lb">Total Price</div><div className="vl" style={{color:"var(--ac)"}}>${voFilt.reduce((t,v)=>t+v.pr,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">Ext. Materials</div><div className="vl" style={{color:"var(--rd)"}}>${voFilt.reduce((t,v)=>t+v.em,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">PFAB Materials</div><div className="vl" style={{color:"var(--rd)"}}>${voFilt.reduce((t,v)=>t+v.pf,0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
<div className="vo-card"><div className="lb">Margin</div><div className="vl" style={{color:"var(--gn)"}}>${voFilt.reduce((t,v)=>t+(v.pr-v.em-v.pf),0).toLocaleString("en-AU",{maximumFractionDigits:0})}</div></div>
</div>
<div className="br">
<button className="pl gn" onClick={()=>sSa(!sa)}>{sa?"Cancel":"+ Add"}</button>
<div style={{display:"flex",gap:2}}>{["all","VO","DL"].map(t=><button key={t} onClick={()=>setFiltTy(t)} style={{padding:"2px 10px",borderRadius:10,border:"1px solid",borderColor:filtTy===t?"var(--ac)":"var(--bd)",background:filtTy===t?"var(--ac)":"transparent",color:filtTy===t?"#fff":"var(--t2)",fontSize:9,fontWeight:600,cursor:"pointer",fontFamily:"var(--ft)"}}>{t==="all"?"All":t}</button>)}</div>
<div style={{display:"flex",gap:2}}>{VO_ST.map(s=>{const cnt=vo.filter(v=>{const pjM=!filtPj||v.pj.toLowerCase().includes(filtPj.toLowerCase());const tyM=filtTy==="all"||v.ty===filtTy;return pjM&&tyM&&v.st.toLowerCase().includes(s.v.toLowerCase().split(" - ")[0].split(" ")[0])}).length;return<button key={s.v} onClick={()=>setFiltSt(p=>p.includes(s.v)?p.filter(x=>x!==s.v):[...p,s.v])} style={{padding:"2px 6px",borderRadius:10,border:"1px solid",borderColor:filtSt.includes(s.v)?s.c:"var(--bd)",background:filtSt.includes(s.v)?s.c:"transparent",color:filtSt.includes(s.v)?"#fff":s.c,fontSize:8,fontWeight:600,cursor:"pointer",fontFamily:"var(--ft)"}}>{s.v.split(" - ")[0].split(" ").slice(0,2).join(" ")} ({cnt})</button>})}</div>
<input className="sx" placeholder="Search project..." value={filtPj} onChange={e=>setFiltPj(e.target.value)}/>
<span style={{fontSize:9,color:"var(--t2)",marginLeft:"auto"}}>{voFilt.length} of {vo.length} · Approved: {apCount}</span>{selRows.size>0&&<button className="pl gn" onClick={async()=>{if(!confirm("Push "+selRows.size+" selected VOs to Master?"))return;sSv(true);for(const r of selRows){const v=vo.find(x=>x._r===r);if(v){await aP({action:"pushToMaster",user,row:v._r});sVo(prev=>prev.map(x=>x._r===r?{...x,pushed:new Date().toLocaleString("en-AU",{maximumFractionDigits:0})}:x))}}setSelRows(new Set());sSv(false);load()}}>{selRows.size} Push Selected</button>}
</div>

{/* Add form */}
{sa&&<div style={{padding:8,background:"var(--s2)",borderRadius:4,marginBottom:6,display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
<select value={nvo.project} onChange={e=>sNvo({...nvo,project:e.target.value})} style={{padding:"3px 6px",fontSize:10}}><option value="">Project...</option>{pj.map(p=><option key={p.nm} value={p.nm}>{p.nm}</option>)}</select>
<select value={nvo.type} onChange={e=>sNvo({...nvo,type:e.target.value})} style={{padding:"3px 6px",fontSize:10}}><option>VO</option><option>DL</option></select>
<input placeholder="Var No." value={nvo.varNo} onChange={e=>sNvo({...nvo,varNo:e.target.value})} style={{width:60,padding:"3px 6px",fontSize:10}}/>
<input placeholder="Name" value={nvo.varName} onChange={e=>sNvo({...nvo,varName:e.target.value})} style={{width:140,padding:"3px 6px",fontSize:10}}/>
<button className="pl gn" onClick={addV}>Add</button>
</div>}

{/* Table */}
<div className="vw"><div className="vsc"><table className="vt"><thead><tr>
{["","☐","Project","Type","Var No.","Name","Date Sub.","Date Appr.","Price","Status","Ext.Mat","PFAB","Margin","#Men","NHrs","NRate","OTHrs","OTRate","Notes","Push"].map((h,ci)=><th key={h+ci} className={ci<2?"":ci<10?"tg":ci<13?"ty":ci<18?"tp":"tg"} style={{width:colW[ci],minWidth:30,...(ci<6?{position:"sticky",left:colW.slice(0,ci).reduce((a,b)=>a+b,0),zIndex:5}:{}),borderRight:ci===5?"2px solid var(--bd)":undefined}}>{h==="☐"?<input type="checkbox" checked={voFilt.length>0&&voFilt.every(v2=>selRows.has(v2._r))} onChange={e=>{if(e.target.checked){const n=new Set(selRows);voFilt.forEach(v2=>n.add(v2._r));setSelRows(n)}else{setSelRows(new Set())}}} style={{cursor:"pointer"}}/>:h}{ci>0&&<div className="col-resize" onMouseDown={e=>startResize(ci,e)}/>}</th>)}
</tr></thead><tbody>
{voFilt.length===0?<tr><td colSpan={20} style={{textAlign:"center",padding:20,color:"var(--t2)"}}>No entries.</td></tr>:
voFilt.map((v,vi)=>{const mg=v.pr-v.em-v.pf;const rc=voRowColor(v.st);return<tr key={v.i} style={{color:rc}}>
<td style={{textAlign:"center",padding:0,width:24,position:"sticky",left:0,zIndex:2}}><button onClick={()=>dVO(v)} style={{background:"none",border:"none",color:"var(--rd)",cursor:"pointer",fontSize:14,fontWeight:700,opacity:.4}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.4} title="Delete">×</button></td>
<td style={{textAlign:"center",padding:0,position:"sticky",left:colW[0],zIndex:2}}><input type="checkbox" checked={selRows.has(v._r)} onChange={e=>{const n=new Set(selRows);if(e.target.checked)n.add(v._r);else n.delete(v._r);setSelRows(n)}} style={{cursor:"pointer"}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1],zIndex:2}}><input list={"pl"+v.i} value={v.pj} onChange={e=>uV(v.i,"pj",e.target.value)} style={{color:rc,width:"100%"}}/><datalist id={"pl"+v.i}>{pj.map(p=><option key={p.nm} value={p.nm}/>)}</datalist></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2],zIndex:2}}><select value={v.ty} onChange={e=>uV(v.i,"ty",e.target.value)} style={{background:"transparent",border:"none",color:rc,fontSize:10,width:"100%"}}><option>VO</option><option>DL</option></select></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2]+colW[3],zIndex:2}}><input value={v.vn} onChange={e=>uV(v.i,"vn",e.target.value)} style={{color:rc}}/></td>
<td style={{position:"sticky",left:colW[0]+colW[1]+colW[2]+colW[3]+colW[4],zIndex:2,borderRight:"2px solid var(--bd)"}}><input value={v.vnm} onChange={e=>uV(v.i,"vnm",e.target.value.substring(0,100))} style={{color:rc}}/></td>
<td><input value={v.ds} onChange={e=>uV(v.i,"ds",e.target.value)} onBlur={e=>uV(v.i,"ds",fmD(e.target.value))} placeholder="dd-mm-yy" style={{color:rc}}/></td>
<td><input value={v.da} onChange={e=>uV(v.i,"da",e.target.value)} onBlur={e=>uV(v.i,"da",fmD(e.target.value))} placeholder="dd-mm-yy" style={{color:rc}}/></td>
<td style={{textAlign:"right"}}><EC value={v.pr} onChange={val=>uV(v.i,"pr",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td><select value={v.st} onChange={e=>uV(v.i,"st",e.target.value)} style={{background:"transparent",border:"none",color:rc,fontSize:10,fontWeight:600,width:"100%"}}><option value="">—</option>{VO_ST.map(s=><option key={s.v} value={s.v}>{s.v}</option>)}</select></td>
<td style={{textAlign:"right"}}><EC value={v.em} onChange={val=>uV(v.i,"em",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right"}}><EC value={v.pf} onChange={val=>uV(v.i,"pf",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right",color:rc,fontFamily:"var(--mn)"}}>{mg?fmP(mg):""}</td>
<td style={{textAlign:"right"}}><EC value={v.nmn} onChange={val=>uV(v.i,"nmn",val)} cls="cl" style={{color:rc}} fmt={fmN}/></td>
<td style={{textAlign:"right"}}><EC value={v.nh} onChange={val=>uV(v.i,"nh",val)} cls="cl" style={{color:rc}} fmt={fm2}/></td>
<td style={{textAlign:"right"}}><EC value={v.nr} onChange={val=>uV(v.i,"nr",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"right"}}><EC value={v.oh} onChange={val=>uV(v.i,"oh",val)} cls="cl" style={{color:rc}} fmt={fm2}/></td>
<td style={{textAlign:"right"}}><EC value={v.or2} onChange={val=>uV(v.i,"or2",val)} cls="cl" style={{color:rc}} fmt={fmP}/></td>
<td style={{textAlign:"center"}} onClick={()=>{setNoteEdit(v.i);setNoteText(v.notes||"")}}>{v.notes?<span title={v.notes} style={{cursor:"pointer",fontSize:14}}>💬</span>:<span style={{cursor:"pointer",color:"var(--t2)",fontSize:12}}>+</span>}</td>
<td style={{textAlign:"center"}}>{v.pushed==="from master"?<span style={{fontSize:8,color:"var(--t2)",fontStyle:"italic"}}>Master</span>:v.pushed?<button className="push-btn" onClick={()=>pushVO(v)} title={"Last pushed: "+v.pushed} style={{background:"var(--ac)"}}>Update</button>:<button className="push-btn" onClick={()=>pushVO(v)}>Push</button>}</td>
</tr>})}
</tbody></table></div></div>

{/* Notes modal */}
{noteEdit!==null&&<div className="notes-modal" onClick={()=>setNoteEdit(null)}>
<div className="notes-box" onClick={e=>e.stopPropagation()}>
<h4>Notes — {vo[noteEdit]?.vnm||vo[noteEdit]?.pj||"Entry"}</h4>
<textarea value={noteText} onChange={e=>setNoteText(e.target.value)} autoFocus placeholder="Type notes here..."/>
<div className="nbtn">
<button className="pl" onClick={()=>setNoteEdit(null)}>Cancel</button>
<button className="pl gn" onClick={()=>{uV(noteEdit,"notes",noteText);setNoteEdit(null)}}>Save</button>
</div></div></div>}
</>}
</div>}

ReactDOM.render(<App/>,document.getElementById("root"));
</script></body></html>
